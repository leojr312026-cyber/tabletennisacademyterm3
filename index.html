                        </div>
                    </div>
                    
                    <div>

                    </div>

                    <div>

                            <option value="U16">U16</option>
                        </select>
                    </div>

                    <div>

                            <button type="button" onclick="toggleDay(this, 'Fri')" class="btn-day border border-gray-600 px-3 py-1 rounded-md text-sm">Fri</button>

        function toggleDay(btn, day) {
            if (selectedDays.includes(day)) {
                selectedDays = selectedDays.filter(d => d !== day);
                btn.classList.remove('active');
            } else {
                if(selectedDays.length >= 3) return;
                selectedDays.push(day);
                btn.classList.add('active');
            }
            updateTimeSlots();
            calculatePrice();
        }

        function updateTimeSlots() {
            const select = document.getElementById('timeSlot');
            select.innerHTML = '';
            const times = selectedDays.includes('Fri') ? ['3:00 PM - 4:00 PM', '4:00 PM - 5:00 PM'] : ['4:00 PM - 5:00 PM', '5:00 PM - 6:00 PM'];
            times.forEach(t => select.innerHTML += `<option value="${t}">${t}</option>`);
        }

        function calculatePrice() {
            const age = document.getElementById('ageGroup').value;
            const weekStart = parseInt(document.getElementById('startWeek').value);
            const dayCount = selectedDays.length;
            if (dayCount === 0) { document.getElementById('displayPrice').innerText = `0 AED`; return 0; }
            const fullPrice = BASE_PRICES[age][dayCount];
            const weeklyRate = fullPrice / TERM_WEEKS;
            const proratedPrice = Math.round(weeklyRate * (TERM_WEEKS - weekStart));
            document.getElementById('displayPrice').innerText = `${proratedPrice.toLocaleString()} AED`;
            return proratedPrice;
        }

        function handleRegister(e) {
            e.preventDefault();
            const newStudent = {
                id: Date.now(),
                name: document.getElementById('kName').value,
                pName: document.getElementById('pName').value,
                pPhone: document.getElementById('pPhone').value,
                pEmail: document.getElementById('pEmail').value,
                ageGroup: document.getElementById('ageGroup').value,
                days: [...selectedDays],
                time: document.getElementById('timeSlot').value,
                price: calculatePrice(),
                status: 'waitlist',
                makeups: 0
            };
            students.push(newStudent);
            renderAll();
            e.target.reset();
            selectedDays = [];
            document.querySelectorAll('.btn-day').forEach(b => b.classList.remove('active'));
            alert("Registered successfully!");
        }

        function renderAll() {
            const container = document.getElementById('rosterContainer');
            container.innerHTML = '';
            let revenue = 0; let activeCount = 0; let waitCount = 0;

            students.forEach(s => {
                if(s.status === 'active') { revenue += s.price; activeCount++; }
                else if(s.status === 'waitlist') waitCount++;

                if(s.status !== currentSection) return;

                const card = `
                <div class="card p-5 rounded-2xl relative">
                    ${s.makeups > 0 ? `<span class="absolute -top-2 -right-2 bg-red-600 text-white text-[10px] font-bold px-2 py-1 rounded-full shadow-lg">${s.makeups} MAKEUP DUE</span>` : ''}
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <h4 class="text-lg font-bold text-yellow-500">${s.name}</h4>
                            <p class="text-xs text-gray-400 uppercase">${s.ageGroup} | ${s.days.join(', ')} | ${s.time}</p>
                        </div>
                        <div class="text-right">
                            <p class="text-sm font-bold">${s.price} AED</p>
                        </div>
                    </div>
                    <div class="text-xs text-gray-500 space-y-1 mb-4">
                        <p><i class="fas fa-user mr-2"></i>${s.pName}</p>
                        <p><i class="fas fa-phone mr-2"></i>${s.pPhone}</p>
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <button onclick="sendWA(${s.id})" class="text-[10px] font-bold bg-green-600/20 text-green-500 py-2 rounded-lg border border-green-500/20 uppercase">WA Message</button>
                        ${s.status === 'waitlist' ? 
                            `<button onclick="updateStatus(${s.id}, 'active')" class="text-[10px] font-bold bg-blue-600 text-white py-2 rounded-lg uppercase">Activate</button>` :
                            `<button onclick="openAbsenceModal(${s.id})" class="text-[10px] font-bold bg-gray-800 text-gray-400 py-2 rounded-lg border border-gray-700 uppercase">Mark Absent</button>`
                        }
                    </div>
                </div>`;
                container.innerHTML += card;
            });

            document.getElementById('stat-total').innerText = `${revenue.toLocaleString()} AED`;
            document.getElementById('stat-kids').innerText = activeCount;
            document.getElementById('stat-wait').innerText = waitCount;
            document.getElementById('section-title').innerText = currentSection === 'active' ? "Active Roster" : "Waiting List";
        }

        function showSection(sec) { currentSection = sec; renderAll(); }

        function updateStatus(id, status) {
            const s = students.find(x => x.id === id);
            s.status = status;
            renderAll();
        }

        function sendWA(id) {
            const s = students.find(x => x.id === id);
            const msg = `Hi ${s.pName}, confirming ${s.name} for Term 3. Schedule: ${s.days.join('/')} at ${s.time}. Total: ${s.price} AED. See you!`;
            window.open(`https://wa.me/${s.pPhone}?text=${encodeURIComponent(msg)}`, '_blank');
        }

        function toggleReceptionMode() {
            const btn = document.getElementById('btn-lock');
            if(btn.innerHTML.includes('Lock')) {
                document.getElementById('pinModal').classList.remove('hidden');
            } else {
                document.getElementById('stats-section').classList.add('hidden');
                document.getElementById('admin-tabs').classList.add('hidden');
                document.getElementById('list-section').classList.add('hidden');
                btn.innerHTML = '<i class="fas fa-unlock mr-2"></i>Unlock Admin';
            }
        }

        function verifyPin() {
            if(document.getElementById('pinInput').value === ADMIN_PIN) {
                document.getElementById('stats-section').classList.remove('hidden');
                document.getElementById('admin-tabs').classList.remove('hidden');
                document.getElementById('list-section').classList.remove('hidden');
                document.getElementById('btn-lock').innerHTML = '<i class="fas fa-lock mr-2"></i>Reception Mode';
                document.getElementById('pinModal').classList.add('hidden');
                document.getElementById('pinInput').value = '';
            } else { alert("Wrong PIN"); }
        }

        function openAbsenceModal(id) { activeStudentId = id; document.getElementById('absenceModal').classList.remove('hidden'); }
        function toggleMakeupBtn() {
            const check = document.getElementById('medCertToggle').checked;
            const btn = document.getElementById('confirmMakeupBtn');
            btn.disabled = !check;
            btn.style.opacity = check ? "1" : "0.3";
        }
        function confirmAbsence() {
            const s = students.find(x => x.id === activeStudentId);
            s.makeups += 1;
            closeModal('absenceModal');
            renderAll();
        }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
        
        function exportToExcel() {
            let csv = "Name,Parent,Phone,Price,Makeups\n";
            students.forEach(s => csv += `${s.name},${s.pName},${s.pPhone},${s.price},${s.makeups}\n`);
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'Academy_Roster.csv';
            a.click();
        }

        updateTimeSlots();
        renderAll();
    </script>
</body>
</html>
