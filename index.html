<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISD TABLE TENNIS | TERM 3 MASTER 53</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background: #050505; color: white; font-family: 'Inter', sans-serif; letter-spacing: -0.02em; }
        .isd-card { background: #111; border: 1px solid rgba(255,255,255,0.05); transition: 0.2s; }
        .isd-card:hover { border-color: #FFD700; }
        .u8-tag { border-left: 5px solid #FF69B4; }
        .u12-tag { border-left: 5px solid #FFD700; }
        .u16-tag { border-left: 5px solid #555; }
        .stat-label { font-size: 8px; font-weight: 900; color: #444; text-transform: uppercase; letter-spacing: 0.15em; }
        .time-chip { background: rgba(255, 215, 0, 0.1); color: #FFD700; border: 1px solid rgba(255, 215, 0, 0.2); font-size: 7px; padding: 2px 5px; border-radius: 4px; text-transform: uppercase; }
        input, select { background: #1a1a1a !important; border: 1px solid #333 !important; color: white !important; }
        .blast-btn { background: linear-gradient(135deg, #25D366 0%, #128C7E 100%); }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <div class="flex flex-col lg:flex-row justify-between items-end mb-10 gap-6">
            <div>
                <h1 class="text-5xl font-black italic text-yellow-500 uppercase leading-none tracking-tighter">ISD TABLE TENNIS</h1>
                <p class="text-gray-500 text-[10px] font-bold uppercase mt-3 tracking-[0.5em]">Term 3 Master Terminal • Created by Leo</p>
            </div>
            <div class="flex flex-wrap gap-2">
                <button onclick="exportCSV()" class="bg-neutral-900 border border-neutral-800 px-6 py-3 rounded-2xl text-[10px] font-black uppercase"><i class="fas fa-download mr-2 text-green-500"></i>Export CSV</button>
            </div>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-12">
            <div class="isd-card p-6 rounded-3xl"><p class="stat-label">Total Roster</p><h3 class="text-2xl font-black">53</h3></div>
            <div class="isd-card p-6 rounded-3xl"><p class="stat-label">T3 Confirmed</p><h3 id="stat-conf" class="text-2xl font-black text-yellow-500">0</h3></div>
            <div class="isd-card p-6 rounded-3xl"><p class="stat-label">Paid Records</p><h3 id="stat-rev" class="text-2xl font-black text-green-500">0</h3></div>
            <div class="isd-card p-6 rounded-3xl blast-btn text-white"><p class="stat-label text-white/70">WhatsApp Blast</p><h3 class="text-xl font-black uppercase">Ready</h3></div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-10">
            <div class="lg:col-span-4">
                <div class="isd-card p-8 rounded-[40px] sticky top-8 border-yellow-500/10">
                    <h3 id="formTitle" class="text-[10px] font-black uppercase mb-6 tracking-widest text-gray-500">Edit Student</h3>
                    <form id="regForm" onsubmit="handleRegistration(event)" class="space-y-4">
                        <input type="hidden" id="editId">
                        <input type="text" id="kName" placeholder="Full Name" required class="w-full p-4 rounded-2xl text-sm outline-none">
                        <div class="grid grid-cols-2 gap-3">
                            <select id="ageGrp" class="p-4 rounded-2xl text-sm font-bold uppercase">
                                <option value="U8">U8</option>
                                <option value="U12" selected>U12</option>
                                <option value="U16">U16</option>
                            </select>
                            <input type="date" id="dob" class="p-4 rounded-2xl text-xs">
                        </div>
                        <input type="email" id="kEmail" placeholder="Parent Email" class="w-full p-4 rounded-2xl text-sm">
                        <div class="grid grid-cols-2 gap-3">
                            <input type="text" id="pName" placeholder="Parent Name" class="p-4 rounded-2xl text-sm">
                            <input type="tel" id="pPhone" placeholder="WhatsApp (05X...)" class="p-4 rounded-2xl text-sm">
                        </div>
                        <div class="p-4 bg-black/40 rounded-2xl border border-white/5">
                            <p class="stat-label mb-2">Weekly Schedule</p>
                            <div class="flex gap-1 mb-4">
                                <button type="button" onclick="setDay(this,'Mon')" class="day-btn flex-1 py-2 rounded-lg border border-neutral-800 text-[10px] font-black">M</button>
                                <button type="button" onclick="setDay(this,'Tue')" class="day-btn flex-1 py-2 rounded-lg border border-neutral-800 text-[10px] font-black">T</button>
                                <button type="button" onclick="setDay(this,'Wed')" class="day-btn flex-1 py-2 rounded-lg border border-neutral-800 text-[10px] font-black">W</button>
                                <button type="button" onclick="setDay(this,'Thu')" class="day-btn flex-1 py-2 rounded-lg border border-neutral-800 text-[10px] font-black">T</button>
                                <button type="button" onclick="setDay(this,'Fri')" class="day-btn flex-1 py-2 rounded-lg border border-neutral-800 text-[10px] font-black">F</button>
                            </div>
                            <p class="stat-label mb-2">Time Slot(s)</p>
                            <select id="timeSlot" class="w-full p-4 rounded-xl text-xs font-bold uppercase" multiple size="5">
                                <option value="3:00 PM - 4:00 PM">3:00 PM - 4:00 PM (Fri Only)</option>
                                <option value="4:00 PM - 5:00 PM">4:00 PM - 5:00 PM</option>
                                <option value="5:00 PM - 6:00 PM">5:00 PM - 6:00 PM</option>
                                <option value="6:00 PM - 7:00 PM">6:00 PM - 7:00 PM</option>
                            </select>
                        </div>
                        <button type="submit" id="submitBtn" class="w-full bg-yellow-500 text-black font-black py-4 rounded-2xl uppercase text-xs">Apply Changes</button>
                    </form>
                </div>
            </div>

            <div class="lg:col-span-8">
                <input type="text" id="search" onkeyup="render()" placeholder="Search all 53 kids..." class="w-full mb-6 bg-neutral-900 border-none rounded-2xl px-6 py-4 text-sm outline-none">
                <div id="roster" class="space-y-3"></div>
            </div>
        </div>
    </div>

    <script>
        // CORE 53 DATASET
        const MASTER_LIST = [
            { id: 1, name: "Musa Junego", pName: "Reena Babar", email: "reena7musa@gmail.com", phone: "0547773836", ageGrp: "U12", dob: "2015-05-15", days: ["Mon"], timeSlots: ["4:00 PM - 5:00 PM"], isPaid: false },
            { id: 2, name: "Samuel Greiner", pName: "Patrick / Miriam", email: "info@miriam-greiner.de", phone: "0507588134", ageGrp: "U12", dob: "2012-03-10", days: ["Mon", "Fri"], timeSlots: ["5:00 PM - 6:00 PM"], isPaid: false },
            { id: 3, name: "Ishaan Kumar", pName: "Ashish Kumar", email: "ashish.kumar02@gmail.com", phone: "0522976720", ageGrp: "U8", dob: "2017-02-12", days: ["Tue", "Thu"], timeSlots: ["4:00 PM - 5:00 PM"], isPaid: false },
            { id: 4, name: "Artem Arzhanov", pName: "Natalia Arzanova", email: "natalia@arz.com", phone: "+79858021467", ageGrp: "U12", dob: "2013-11-20", days: ["Wed", "Fri"], timeSlots: ["3:00 PM - 4:00 PM", "4:00 PM - 5:00 PM"], isPaid: false },
            { id: 5, name: "Tehzeeb Ali", pName: "Gows Basha", email: "gows@ali.com", phone: "0552025369", ageGrp: "U16", dob: "2009-08-05", days: ["Wed", "Fri"], timeSlots: ["5:00 PM - 6:00 PM"], isPaid: false }
        ];

        // Fill remaining slots
        for(let i=6; i<=53; i++){
            MASTER_LIST.push({ id: i, name: `Student #${i} (T3 Pending)`, pName: "-", email: "-", phone: "0500000000", ageGrp: "U12", dob: "", days: [], timeSlots: [], isPaid: false });
        }

        let students = JSON.parse(localStorage.getItem('isd_master_53_final')) || MASTER_LIST;
        let selectedDays = [];

        const save = () => localStorage.setItem('isd_master_53_final', JSON.stringify(students));

        function setDay(btn, d) {
            if(selectedDays.includes(d)) {
                selectedDays = selectedDays.filter(x => x !== d);
                btn.classList.remove('bg-yellow-500', 'text-black');
            } else {
                selectedDays.push(d);
                btn.classList.add('bg-yellow-500', 'text-black');
            }
        }

        function handleRegistration(e) {
            e.preventDefault();
            const editId = document.getElementById('editId').value;
            const timeSelect = document.getElementById('timeSlot');
            const selectedTimes = Array.from(timeSelect.selectedOptions).map(opt => opt.value);

            const sData = {
                name: document.getElementById('kName').value,
                pName: document.getElementById('pName').value,
                email: document.getElementById('kEmail').value,
                phone: document.getElementById('pPhone').value,
                ageGrp: document.getElementById('ageGrp').value,
                dob: document.getElementById('dob').value,
                days: [...selectedDays],
                timeSlots: selectedTimes
            };

            const index = students.findIndex(x => x.id == editId);
            if(index !== -1) {
                students[index] = { ...students[index], ...sData };
                save(); resetForm(); render();
            }
        }

        function editStudent(id) {
            const s = students.find(x => x.id == id);
            document.getElementById('editId').value = s.id;
            document.getElementById('kName').value = s.name;
            document.getElementById('pName').value = s.pName;
            document.getElementById('kEmail').value = s.email;
            document.getElementById('pPhone').value = s.phone;
            document.getElementById('ageGrp').value = s.ageGrp;
            document.getElementById('dob').value = s.dob;
            
            selectedDays = [...s.days];
            const map = ["Mon", "Tue", "Wed", "Thu", "Fri"];
            document.querySelectorAll('.day-btn').forEach((b, i) => {
                if(selectedDays.includes(map[i])) b.classList.add('bg-yellow-500', 'text-black');
                else b.classList.remove('bg-yellow-500', 'text-black');
            });
            const tSel = document.getElementById('timeSlot');
            Array.from(tSel.options).forEach(o => o.selected = s.timeSlots.includes(o.value));
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function togglePaid(id) {
            const s = students.find(x => x.id == id);
            s.isPaid = !s.isPaid;
            save(); render();
        }

        function sendBlast(id) {
            const s = students.find(x => x.id == id);
            const msg = `Hi ${s.pName}, greetings from *ISD TABLE TENNIS!* 🏓 We're getting ready for *Term 3* (starting March 30th). We have *${s.name}* scheduled for: *${s.days.join('/')}* at *${s.timeSlots.join(' & ')}*. Shall we confirm this spot? - Leo`;
            window.open(`https://wa.me/${s.phone}?text=${encodeURIComponent(msg)}`);
        }

        function resetForm() {
            document.getElementById('regForm').reset();
            selectedDays = [];
            document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('bg-yellow-500', 'text-black'));
        }

        function render() {
            const container = document.getElementById('roster');
            const search = document.getElementById('search').value.toLowerCase();
            container.innerHTML = '';
            
            let paid = 0, conf = 0;
            students.forEach(s => {
                if(s.isPaid) paid++;
                if(s.days.length > 0) conf++;
                if(!s.name.toLowerCase().includes(search) && !s.email.toLowerCase().includes(search)) return;

                container.innerHTML += `
                    <div class="isd-card p-5 rounded-3xl flex flex-col md:flex-row justify-between items-center gap-4 ${s.ageGrp==='U8'?'u8-tag':s.ageGrp==='U12'?'u12-tag':'u16-tag'}">
                        <div class="flex-1 w-full">
                            <h4 class="text-lg font-black uppercase italic mb-2">${s.name}</h4>
                            <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 text-[9px] font-bold text-gray-500">
                                <div><p class="stat-label">Guardian</p><p class="text-white">${s.pName}</p></div>
                                <div><p class="stat-label">Schedule</p><p class="text-white">${s.days.join(', ')}</p></div>
                                <div><p class="stat-label">Slots</p><div class="flex flex-wrap gap-1 mt-1">${s.timeSlots.map(t => `<span class="time-chip">${t}</span>`).join('')}</div></div>
                                <div><p class="stat-label">Parent Email</p><p class="text-gray-400 truncate">${s.email}</p></div>
                            </div>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="sendBlast(${s.id})" class="bg-green-600/20 text-green-500 p-3 rounded-xl hover:bg-green-600 hover:text-white transition"><i class="fab fa-whatsapp"></i></button>
                            <button onclick="editStudent(${s.id})" class="bg-neutral-800 text-white p-3 rounded-xl hover:bg-neutral-700"><i class="fas fa-pen"></i></button>
                            <button onclick="togglePaid(${s.id})" class="p-3 rounded-xl border border-neutral-800 ${s.isPaid?'bg-green-600 text-white border-green-600':'text-gray-600'}">
                                <i class="fas fa-check"></i>
                            </button>
                        </div>
                    </div>
                `;
            });
            document.getElementById('stat-rev').innerText = paid;
            document.getElementById('stat-conf').innerText = conf;
        }

        function exportCSV() {
            let csv = "Name,Parent,Email,Phone,Group,Days,Slots,Paid\n";
            students.forEach(s => csv += `"${s.name}","${s.pName}","${s.email}","${s.phone}","${s.ageGrp}","${s.days.join('/')}","${s.timeSlots.join('&')}",${s.isPaid}\n`);
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = 'ISD_TERM3_DATABASE.csv'; a.click();
        }

        render();
    </script>
</body>
</html>
