        function renderList() {
            const container = document.getElementById('student-list');
            const search = document.getElementById('search').value.toLowerCase();
            container.innerHTML = '';

            let counts = { invited: 0, confirmed: 0, paid: 0 };

            students.forEach(s => {
                if (s.status === 'Invited') counts.invited++;
                if (s.status === 'Confirmed') counts.confirmed++;
                if (s.status === 'Paid') counts.paid++;

                if (s.name.toLowerCase().includes(search) || s.pName.toLowerCase().includes(search)) {
                    let statusClass = 'status-pending';
                    if (s.status === 'Invited') statusClass = 'status-invited';
                    if (s.status === 'Confirmed') statusClass = 'status-confirmed';
                    if (s.status === 'Paid') statusClass = 'status-paid';

                    container.innerHTML += `
                    <div class="list-row grid grid-cols-1 md:grid-cols-12 gap-4 p-4 items-center ${statusClass}">
                        <div class="col-span-3">
                            <h4 class="font-bold text-white uppercase italic">${s.name}</h4>
                            <p class="text-[10px] text-gray-500 font-bold tracking-tight">${s.pName} | ${s.pPhone}</p>
                        </div>
                        <div class="col-span-2 text-xs text-gray-400 font-medium">
                            ${s.days}<br><span class="text-yellow-600">${s.time}</span>
                        </div>
                        <div class="col-span-2 flex gap-2">

                                <i class="fab fa-whatsapp mr-1"></i> INVITE
                             </button>
                             <button onclick="askAleksey(${s.id})" class="bg-gray-800 text-white p-2 rounded-lg text-[10px] font-bold hover:bg-gray-700">
                                CHANGE?
                             </button>
                        </div>
                        <div class="col-span-5 flex justify-end gap-1">
                            <button onclick="updateStatus(${s.id}, 'Invited')" class="px-2 py-1 rounded text-[8px] font-black border border-yellow-500/50 text-yellow-500 uppercase">Invited</button>
                            <button onclick="updateStatus(${s.id}, 'Confirmed')" class="px-2 py-1 rounded text-[8px] font-black bg-green-900/40 text-green-300 uppercase italic">Yes, Lock it in</button>
                            <button onclick="updateStatus(${s.id}, 'No')" class="px-2 py-1 rounded text-[8px] font-black text-red-500/50 uppercase">Not Joining</button>
                            <button onclick="updateStatus(${s.id}, 'Paid')" class="px-3 py-1 rounded text-[8px] font-black bg-green-600 text-black uppercase">PAID & ISDB DONE</button>
                        </div>
                    </div>`;
                }
            });

            document.getElementById('stat-invited').innerText = counts.invited;
            document.getElementById('stat-confirmed').innerText = counts.confirmed;
            document.getElementById('stat-paid').innerText = counts.paid;
        }

        function sendInvite(id) {
            const s = students.find(x => x.id === id);
            const msg = `Hi ${s.pName}, this is ISD Table Tennis. We're inviting ${s.name} for Term 3! Schedule: ${s.days} at ${s.time}. Please confirm to lock it in!`;
            window.open(`https://wa.me/${s.pPhone}?text=${encodeURIComponent(msg)}`, '_blank');
            updateStatus(id, 'Invited');
        }

        function askAleksey(id) {
            const s = students.find(x => x.id === id);
            const msg = `GROUP UPDATE: ${s.name} requesting a change for Term 3. Preferred day/time? @Coach Aleksey`;
            // Sending to WhatsApp (This will open your last chat/group)
            window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
        }

        function updateStatus(id, status) {
            const s = students.find(x => x.id === id);
            if (status === 'No') {
                if(confirm("Remove " + s.name + " from active list?")) {
                    students = students.filter(x => x.id !== id);
                }
            } else {
                s.status = status;
            }
            renderList();
        }

        function exportToExcel() {
            let csv = "Student Name,Parent,Phone,Days,Time,Status\n";
            students.forEach(s => {
                csv += `"${s.name}","${s.pName}","${s.pPhone}","${s.days}","${s.time}","${s.status}"\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'ISD_Term3_Roster.csv';
            a.click();
        }
