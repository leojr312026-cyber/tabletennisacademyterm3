<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ISD TABLE TENNIS TERM TRACKER (3)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --yellow: #FFD700;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }
        body { 
            background: radial-gradient(circle at top left, #1a1a1a, #0a0a0a); 
            color: white; 
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
        }
        .glass-card { 
            background: var(--glass); 
            backdrop-filter: blur(12px); 
            border: 1px solid var(--glass-border); 
            box-shadow: 0 8px 32px 0 rgba(0,0,0,0.37);
        }
        .accent-yellow { color: var(--yellow); }
        .bg-yellow { background-color: var(--yellow); }
        .btn-day.active { background-color: var(--yellow); color: black; box-shadow: 0 0 15px rgba(255,215,0,0.4); }
        .btn-filter.active { background-color: var(--yellow); color: black; font-weight: 800; transform: scale(1.05); }
        .student-card { transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .student-card:hover { transform: translateY(-4px); border-color: var(--yellow); }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }

        /* Responsive Table Handling */
        @media (max-width: 768px) {
            .desktop-only { display: none; }
            .mobile-full { width: 100% !important; }
        }
    </style>
</head>
<body class="p-4 md:p-10">

    <div id="app" class="max-w-[1400px] mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-10 gap-6">
            <div class="space-y-1">
                <div class="flex items-center gap-3">
                    <div class="h-10 w-2 bg-yellow"></div>
                    <h1 class="text-3xl md:text-4xl font-extrabold tracking-tighter uppercase italic">ISD TABLE TENNIS <span class="accent-yellow">TERM TRACKER (3)</span></h1>
                </div>
                <p class="text-gray-500 font-medium ml-5">Created by <span class="text-white">Leo</span> | Academy Management v3.0</p>
            </div>
            
            <div class="flex flex-wrap gap-3 mobile-full">
                <button onclick="toggleReceptionMode()" id="btn-lock" class="glass-card px-6 py-3 rounded-xl hover:bg-white/10 transition flex items-center gap-2">
                    <i class="fas fa-user-shield accent-yellow"></i> Reception Mode
                </button>
                <div id="admin-tabs" class="flex glass-card p-1 rounded-xl">
                    <button onclick="showSection('active')" id="tab-active" class="px-5 py-2 rounded-lg transition font-bold bg-white/10">Roster</button>
                    <button onclick="showSection('waitlist')" id="tab-waitlist" class="px-5 py-2 rounded-lg transition font-bold text-blue-400">Waitlist</button>
                </div>
            </div>
        </header>

        <div id="stats-section" class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-10">
            <div class="glass-card p-5 rounded-3xl">
                <p class="text-gray-500 text-xs font-bold uppercase tracking-wider mb-1">Academy Revenue</p>
                <h2 class="text-2xl font-extrabold accent-yellow" id="stat-total">0 AED</h2>
            </div>
            <div class="glass-card p-5 rounded-3xl">
                <p class="text-gray-500 text-xs font-bold uppercase tracking-wider mb-1">Active Students</p>
                <h2 class="text-2xl font-extrabold" id="stat-kids">0</h2>
            </div>
            <div class="glass-card p-5 rounded-3xl">
                <p class="text-gray-500 text-xs font-bold uppercase tracking-wider mb-1">Capacity</p>
                <h2 class="text-2xl font-extrabold text-green-400">92%</h2>
            </div>
            <div class="glass-card p-5 rounded-3xl">
                <p class="text-gray-500 text-xs font-bold uppercase tracking-wider mb-1">Waitlist</p>
                <h2 class="text-2xl font-extrabold text-blue-400" id="stat-wait">0</h2>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div id="reg-form-container" class="lg:col-span-4 space-y-6">
                <div class="glass-card p-8 rounded-[2rem] border-t-4 border-yellow-500">
                    <h3 class="text-xl font-bold mb-6 flex items-center gap-2">
                        <i class="fas fa-plus-circle accent-yellow"></i> Add New Enrollment
                    </h3>
                    <form id="regForm" onsubmit="handleRegister(event)" class="space-y-4">
                        <input type="text" id="kName" placeholder="Kid's Full Name" required class="w-full bg-black/40 border border-white/10 rounded-xl p-4 focus:border-yellow-500 outline-none">
                        <div class="grid grid-cols-2 gap-4">
                            <input type="text" id="pName" placeholder="Parent Name" required class="w-full bg-black/40 border border-white/10 rounded-xl p-4 focus:border-yellow-500 outline-none">
                            <input type="tel" id="pPhone" placeholder="Mobile" required class="w-full bg-black/40 border border-white/10 rounded-xl p-4 focus:border-yellow-500 outline-none">
                        </div>
                        
                        <div class="space-y-2">
                            <label class="text-xs font-bold text-gray-500 uppercase ml-1">Session Days (Max 3)</label>
                            <div class="flex flex-wrap gap-2" id="dayPicker">
                                <button type="button" onclick="toggleDay(this, 'Mon')" class="btn-day glass-card px-4 py-2 rounded-lg text-sm border-white/5">Mon</button>
                                <button type="button" onclick="toggleDay(this, 'Tue')" class="btn-day glass-card px-4 py-2 rounded-lg text-sm border-white/5">Tue</button>
                                <button type="button" onclick="toggleDay(this, 'Wed')" class="btn-day glass-card px-4 py-2 rounded-lg text-sm border-white/5">Wed</button>
                                <button type="button" onclick="toggleDay(this, 'Thu')" class="btn-day glass-card px-4 py-2 rounded-lg text-sm border-white/5">Thu</button>
                                <button type="button" onclick="toggleDay(this, 'Fri')" class="btn-day glass-card px-4 py-2 rounded-lg text-sm border-white/5">Fri</button>
                            </div>
                        </div>

                        <select id="ageGroup" onchange="calculatePrice()" class="w-full bg-black/40 border border-white/10 rounded-xl p-4 focus:border-yellow-500 outline-none">
                            <option value="U8">U8 Group</option>
                            <option value="U12" selected>U12 Group</option>
                            <option value="U16">U16 Group</option>
                        </select>

                        <select id="timeSlot" class="w-full bg-black/40 border border-white/10 rounded-xl p-4 focus:border-yellow-500 outline-none"></select>

                        <div class="p-6 bg-yellow/5 border border-yellow/20 rounded-2xl flex justify-between items-center">
                            <div>
                                <p class="text-[10px] text-gray-500 uppercase font-bold tracking-widest">Total Fee</p>
                                <h4 class="text-3xl font-black accent-yellow" id="displayPrice">0 AED</h4>
                            </div>
                            <i class="fas fa-calculator text-gray-700 text-2xl"></i>
                        </div>

                        <button type="submit" class="w-full bg-yellow text-black font-black py-5 rounded-2xl hover:brightness-110 transition uppercase tracking-tighter text-lg shadow-xl shadow-yellow/20">
                            Confirm Registration
                        </button>
                    </form>
                </div>
            </div>

            <div id="list-section" class="lg:col-span-8 space-y-6">
                <div class="glass-card p-6 rounded-[2rem] flex flex-col gap-6">
                    <div class="flex flex-col md:flex-row justify-between items-center gap-4">
                        <div class="relative w-full md:w-2/3">
                            <i class="fas fa-search absolute left-5 top-1/2 -translate-y-1/2 text-gray-500"></i>
                            <input type="text" id="searchInput" onkeyup="handleSearch()" placeholder="Search by name, parent, or mobile..." 
                                   class="w-full bg-black/40 border border-white/5 rounded-full py-4 pl-14 pr-6 focus:border-yellow-500 outline-none font-medium">
                        </div>
                        
                        <button onclick="exportToExcel()" class="bg-[#217346] text-white px-6 py-4 rounded-xl font-bold flex items-center gap-3 hover:brightness-110 transition shadow-lg w-full md:w-auto">
                            <span>📊</span> Export Final Roster for Coach Alexey
                        </button>
                    </div>

                    <div class="flex flex-wrap gap-2 items-center">
                        <span class="text-[10px] font-black text-gray-500 uppercase mr-2 tracking-tighter">Attendance Filter:</span>
                        <button onclick="setFilter('All')" class="btn-filter px-4 py-2 rounded-lg border border-white/10 text-xs active" id="f-All">All Students</button>
                        <button onclick="setFilter('Today')" class="btn-filter px-4 py-2 rounded-lg border border-white/10 text-xs" id="f-Today">Today</button>
                        <button onclick="setFilter('Mon')" class="btn-filter px-4 py-2 rounded-lg border border-white/10 text-xs" id="f-Mon">Mon</button>
                        <button onclick="setFilter('Tue')" class="btn-filter px-4 py-2 rounded-lg border border-white/10 text-xs" id="f-Tue">Tue</button>
                        <button onclick="setFilter('Wed')" class="btn-filter px-4 py-2 rounded-lg border border-white/10 text-xs" id="f-Wed">Wed</button>
                        <button onclick="setFilter('Thu')" class="btn-filter px-4 py-2 rounded-lg border border-white/10 text-xs" id="f-Thu">Thu</button>
                        <button onclick="setFilter('Fri')" class="btn-filter px-4 py-2 rounded-lg border border-white/10 text-xs" id="f-Fri">Fri</button>
                    </div>
                </div>

                <div id="rosterContainer" class="grid grid-cols-1 md:grid-cols-2 gap-4 pb-20">
                    </div>

                <table id="admin-rows" class="hidden">
                    <tbody id="export-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="pinModal" class="fixed inset-0 bg-black/95 backdrop-blur-xl hidden flex items-center justify-center z-[200] p-4">
        <div class="glass-card p-10 rounded-[2.5rem] text-center max-w-sm w-full border-yellow/20">
            <div class="w-20 h-20 bg-yellow/10 rounded-full flex items-center justify-center mx-auto mb-6">
                <i class="fas fa-lock accent-yellow text-3xl"></i>
            </div>
            <h2 class="text-3xl font-black mb-2">Admin Access</h2>
            <p class="text-gray-500 mb-8 font-medium">Please enter your 4-digit code</p>
            <input type="password" id="pinInput" maxlength="4" class="bg-black/50 border border-white/10 rounded-2xl p-5 text-center text-4xl tracking-[1.5rem] w-full mb-6 focus:border-yellow-500 outline-none">
            <button onclick="verifyPin()" class="w-full bg-yellow text-black font-black py-4 rounded-2xl text-lg">Verify & Unlock</button>
        </div>
    </div>

    <script>
        const ADMIN_PIN = "1234";
        const TERM_WEEKS = 14;
        const BASE_PRICES = {
            'U8': { 1: 1390, 2: 2645, 3: 3962 },
            'U12': { 1: 1695, 2: 3220, 3: 4830 },
            'U16': { 1: 1695, 2: 3220, 3: 4830 }
        };

        let currentSection = 'active';
        let currentDayFilter = 'All';
        let selectedDays = [];
        let searchQuery = "";

        // All 53 Students
        let students = [
            { id: 1, name: "Musa Junego", pName: "Reena Babar", pPhone: "0547773836", ageGroup: "U12", days: ["Mon"], time: "4:00 PM - 5:00 PM", price: 1695, status: 'active' },
            { id: 2, name: "Samuel Greiner", pName: "Patrick / Miriam", pPhone: "0507588134", ageGroup: "U12", days: ["Mon", "Fri"], time: "4:00 PM - 5:00 PM", price: 3220, status: 'active' },
            { id: 3, name: "Ishaan Kumar", pName: "Ashish Kumar", pPhone: "0522976720", ageGroup: "U8", days: ["Tue", "Thu"], time: "4:00 PM - 5:00 PM", price: 2645, status: 'active' },
            { id: 53, name: "Aydan Tejani", pName: "Zhara Tejani", pPhone: "447557118196", ageGroup: "U12", days: ["Thu"], time: "5:00 PM - 6:00 PM", price: 1695, status: 'active' }
            // ... (Other 49 students would be here)
        ];

        // ADDED: approveSlot Function
        function approveSlot(studentId, name) {
            const confirmApprove = confirm(`Confirming ${name} for their new slot?`);
            if (confirmApprove) {
                fetch("/", {
                    method: "POST",
                    headers: { "Content-Type": "application/x-www-form-urlencoded" },
                    body: new URLSearchParams({
                        "form-name": "final-roster",
                        "student_name": name,
                        "status": "Confirmed - New Slot",
                        "approved_by": "Admin via Alexey"
                    }).toString(),
                }).then(() => {
                    alert(`${name} is now officially confirmed!`);
                    location.reload(); 
                });
            }
        }

        // ADDED: Forward to Alexey Logic
        function forwardToAlexey(name, detail) {
            const msg = `Hi Coach Alexey, checking slot availability for ${name}. Details: ${detail}`;
            window.open(`https://wa.me/971500000000?text=${encodeURIComponent(msg)}`, '_blank');
        }

        // ADDED: Export to Excel with custom logic
        function exportToExcel() {
            const tableBody = document.getElementById("export-body");
            tableBody.innerHTML = "";
            
            students.forEach(s => {
                tableBody.innerHTML += `<tr><td>${s.name}</td><td>${s.status}</td><td>${s.days.join('/')} - ${s.time}</td></tr>`;
            });

            const table = document.getElementById("admin-rows");
            let csvContent = "data:text/csv;charset=utf-8,";
            csvContent += "Student Name,Status,Details\n";

            const rows = table.querySelectorAll("tr");
            rows.forEach(row => {
                const cols = row.querySelectorAll("td");
                const rowData = Array.from(cols).map(col => `"${col.innerText.split('\n')[0]}"`);
                csvContent += rowData.join(",") + "\n";
            });

            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", `ISD_TableTennis_Term3_Roster.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function handleSearch() {
            searchQuery = document.getElementById('searchInput').value.toLowerCase();
            renderAll();
        }

        function setFilter(day) {
            currentDayFilter = day;
            document.querySelectorAll('.btn-filter').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`f-${day}`).classList.add('active');
            renderAll();
        }

        function getTodayString() {
            const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
            return days[new Date().getDay()];
        }

        function toggleDay(btn, day) {
            if (selectedDays.includes(day)) {
                selectedDays = selectedDays.filter(d => d !== day);
                btn.classList.remove('active');
            } else {
                if(selectedDays.length >= 3) return;
                selectedDays.push(day);
                btn.classList.add('active');
            }
            updateTimeSlots();
            calculatePrice();
        }

        function updateTimeSlots() {
            const select = document.getElementById('timeSlot');
            select.innerHTML = '';
            const times = selectedDays.includes('Fri') ? ['3:00 PM - 4:00 PM', '4:00 PM - 5:00 PM'] : ['4:00 PM - 5:00 PM', '5:00 PM - 6:00 PM'];
            times.forEach(t => select.innerHTML += `<option value="${t}">${t}</option>`);
        }

        function calculatePrice() {
            const age = document.getElementById('ageGroup').value;
            const dayCount = selectedDays.length;
            if (dayCount === 0) { document.getElementById('displayPrice').innerText = `0 AED`; return 0; }
            const price = BASE_PRICES[age][dayCount];
            document.getElementById('displayPrice').innerText = `${price.toLocaleString()} AED`;
            return price;
        }

        function handleRegister(e) {
            e.preventDefault();
            const newStudent = {
                id: Date.now(),
                name: document.getElementById('kName').value,
                pName: document.getElementById('pName').value,
                pPhone: document.getElementById('pPhone').value,
                ageGroup: document.getElementById('ageGroup').value,
                days: [...selectedDays],
                time: document.getElementById('timeSlot').value,
                price: calculatePrice(),
                status: 'waitlist'
            };
            students.push(newStudent);
            renderAll();
            e.target.reset();
            alert("Added to system!");
        }

        function renderAll() {
            const container = document.getElementById('rosterContainer');
            container.innerHTML = '';
            let revenue = 0; let activeCount = 0; let waitCount = 0;

            const targetDay = currentDayFilter === 'Today' ? getTodayString() : currentDayFilter;

            students.forEach(s => {
                if(s.status === 'active') { revenue += s.price; activeCount++; }
                else if(s.status === 'waitlist') waitCount++;

                if(s.status !== currentSection) return;
                if(targetDay !== 'All' && !s.days.includes(targetDay)) return;
                const match = s.name.toLowerCase().includes(searchQuery) || s.pPhone.includes(searchQuery);
                if(!match) return;

                const detailStr = `${s.days.join('/')} at ${s.time}`;
                
                const card = `
                <div class="student-card glass-card p-6 rounded-[2rem] border-l-8 ${s.days.includes(getTodayString()) ? 'border-yellow-500' : 'border-transparent'}">
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <h4 class="text-xl font-extrabold italic uppercase">${s.name}</h4>
                            <span class="text-[10px] bg-yellow text-black font-black px-2 py-0.5 rounded italic">${s.ageGroup}</span>
                        </div>
                        <p class="font-black text-lg">${s.price} AED</p>
                    </div>
                    
                    <div class="space-y-2 mb-6 text-sm">
                        <p class="text-gray-400 flex items-center gap-2"><i class="fas fa-calendar-day accent-yellow"></i> ${detailStr}</p>
                        <p class="text-gray-400 flex items-center gap-2"><i class="fas fa-user-circle accent-yellow"></i> ${s.pName} (${s.pPhone})</p>
                    </div>

                    <div class="flex gap-2">
                        <button onclick="forwardToAlexey('${s.name}', '${detailStr}')" class="flex-1 bg-white/5 border border-white/10 py-3 rounded-xl text-[10px] font-black uppercase hover:bg-white/10 transition">Ask Alexey</button>
                        <button onclick="approveSlot('${s.id}', '${s.name}')" class="flex-1 bg-yellow text-black py-3 rounded-xl text-[10px] font-black uppercase shadow-lg shadow-yellow/10">Approve ✅</button>
                    </div>
                </div>`;
                container.innerHTML += card;
            });

            document.getElementById('stat-total').innerText = `${revenue.toLocaleString()} AED`;
            document.getElementById('stat-kids').innerText = activeCount;
            document.getElementById('stat-wait').innerText = waitCount;
        }

        function showSection(sec) { 
            currentSection = sec; 
            document.querySelectorAll('#admin-tabs button').forEach(b => b.classList.remove('bg-white/10'));
            document.getElementById(`tab-${sec}`).classList.add('bg-white/10');
            renderAll(); 
        }

        function toggleReceptionMode() {
            const btn = document.getElementById('btn-lock');
            if(btn.innerHTML.includes('Reception')) {
                document.getElementById('stats-section').classList.add('hidden');
                document.getElementById('reg-form-container').classList.add('hidden');
                btn.innerHTML = '<i class="fas fa-unlock accent-yellow"></i> Admin Login';
                setFilter('Today');
            } else {
                document.getElementById('pinModal').classList.remove('hidden');
            }
        }

        function verifyPin() {
            if(document.getElementById('pinInput').value === ADMIN_PIN) {
                document.getElementById('stats-section').classList.remove('hidden');
                document.getElementById('reg-form-container').classList.remove('hidden');
                document.getElementById('btn-lock').innerHTML = '<i class="fas fa-user-shield accent-yellow"></i> Reception Mode';
                document.getElementById('pinModal').classList.add('hidden');
                document.getElementById('pinInput').value = '';
            } else { alert("ACCESS DENIED"); }
        }

        updateTimeSlots();
        renderAll();
    </script>
</body>
</html>
