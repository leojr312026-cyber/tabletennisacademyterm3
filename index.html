        :root { --isd-yellow: #FFD700; --isd-green: #228B22; --isd-red: #ff4d4d; }

        .glass { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.08); backdrop-filter: blur(20px); }
        .dot { width: 14px; height: 14px; border-radius: 4px; border: 1px solid #333; cursor: pointer; transition: 0.2s; }
        .dot.present { background: var(--isd-green); box-shadow: 0 0 10px var(--isd-green); border-color: transparent; }
        .dot.absent { background: var(--isd-red); box-shadow: 0 0 10px var(--isd-red); border-color: transparent; }
        .status-paid { background: rgba(34, 139, 34, 0.12) !important; border-left: 4px solid var(--isd-green); }
        .status-invited { border-left: 4px solid var(--isd-yellow); }
        .audit-trail { font-size: 8px; color: #555; font-style: italic; margin-top: 4px; }
        .makeup-badge { background: var(--isd-red); color: white; font-size: 9px; padding: 2px 6px; border-radius: 10px; font-weight: 900; }

        function login() {
            currentUser = document.getElementById('user-select').value;
            const roles = { 'Lulu':'admin','Diego':'admin','Leo':'reception','Tima':'reception','Rafa':'reception','Vanessa':'reception','Christine':'reception','Joy':'reception','Alexey':'coach','Yulia':'coach','Sarah':'coach' };
            currentRole = roles[currentUser];
            document.getElementById('login-overlay').classList.add('hidden');
            document.getElementById('app-content').classList.remove('hidden');
            document.getElementById('auth-info').innerText = `ACCESS GRANTED: ${currentUser} (${currentRole})`;
            if(currentRole === 'admin') {
                document.getElementById('nav-report').classList.remove('hidden');
                document.getElementById('admin-rev-box').classList.remove('hidden');
            }
            startSync();
        }

        function startSync() {
            // Check if DB is empty, then seed with 53 kids
            db.ref('students').once('value', snap => {
                if(!snap.exists()) {
                    initialData.forEach(s => {
                        db.ref('students/' + s.id).set({ ...s, status: 'Pending', attendance: [0,0,0,0,0], makeups: 0, lastBy: 'Init', lastTime: '-' });
                    });
                }
            });
            db.ref('students').on('value', snap => render(snap.val()));
        }

        function render(data) {
            const list = document.getElementById('list-container');
            const q = document.getElementById('search').value.toLowerCase();
            list.innerHTML = '';
            let stats = { paid: 0, rev: 0 };

            Object.keys(data).forEach(key => {
                const s = data[key];
                if(s.status === 'Paid') { stats.paid++; stats.rev += (FEES[s.days.length] || 0); }
                if(!s.name.toLowerCase().includes(q) && !s.pPhone.includes(q)) return;

                list.innerHTML += `
                    <div class="p-4 grid grid-cols-1 md:grid-cols-12 gap-4 items-center ${s.status === 'Paid' ? 'status-paid' : s.status === 'Invited' ? 'status-invited' : ''}">
                        <div class="col-span-3">
                            <h4 class="font-black uppercase text-sm italic">${s.name}</h4>
                            <p class="text-[9px] text-gray-500 font-bold tracking-widest">${s.pName} | ${s.pPhone}</p>
                            <p class="audit-trail">Modified by ${s.lastBy} @ ${s.lastTime}</p>
                        </div>
                        <div class="col-span-2 text-center text-[10px] font-black text-yellow-600">${s.days.join('/')} @ ${s.time}</div>
                        <div class="col-span-3 flex justify-center gap-2">
                            ${s.attendance.map((v, i) => `<div onclick="updateAtt('${key}', ${i}, ${v})" class="dot ${v===1?'present':v===2?'absent':''}"></div>`).join('')}
                        </div>
                        <div class="col-span-4 flex justify-end gap-1">
                            ${currentRole !== 'coach' ? `
                                <button onclick="setStatus('${key}', 'Invited')" class="px-2 py-1 bg-blue-600 rounded text-[8px] font-black">INVITE</button>
                                <button onclick="setStatus('${key}', 'Paid')" class="px-2 py-1 bg-green-600 text-black rounded text-[8px] font-black">PAID</button>
                            ` : `<span class="text-[8px] font-black text-gray-600 uppercase">Coach View Only</span>`}
                        </div>
                    </div>`;
            });
            document.getElementById('stat-paid').innerText = stats.paid;
            document.getElementById('stat-rev').innerText = stats.rev.toLocaleString() + ' AED';
            if(currentRole === 'admin') generateReports(data);
            renderMakeups(data);
        }

        function updateAtt(id, idx, val) {
            const newVal = (val + 1) % 3;
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            db.ref(`students/${id}`).update({ [`attendance/${idx}`]: newVal, lastBy: currentUser, lastTime: time });
            if(newVal === 2) db.ref(`students/${id}/makeups`).transaction(m => (m || 0) + 1);
        }

        function setStatus(id, stat) {
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            db.ref(`students/${id}`).update({ status: stat, lastBy: currentUser, lastTime: time });
        }

        function renderMakeups(data) {
            const list = document.getElementById('makeup-list'); list.innerHTML = '';
            Object.values(data).filter(s => s.makeups > 0).forEach(s => {
                list.innerHTML += `
                    <div class="glass p-4 rounded-2xl flex justify-between items-center border-l-4 border-red-500">
                        <div><h4 class="font-black italic">${s.name}</h4><p class="text-[10px] text-gray-400">Owed: ${s.makeups} Sessions</p></div>
                        <button onclick="clearMakeup('${s.id}')" class="bg-white text-black text-[9px] font-black px-4 py-2 rounded-lg">CLEAR 1</button>
                    </div>`;
            });
        }

        function clearMakeup(id) {
            db.ref(`students/${id}/makeups`).transaction(m => Math.max(0, m - 1));
        }

        function generateReports(data) {
            const f = document.getElementById('report-fin');
            const s = document.getElementById('report-slots');
            let rev = 0; let paid = 0; let kids = Object.values(data);
            kids.forEach(k => { if(k.status === 'Paid') { rev += (FEES[k.days.length] || 0); paid++; } });
            f.innerHTML = `<div class="flex justify-between"><span>Revenue Collected:</span><span class="text-green-400 font-black">${rev.toLocaleString()} AED</span></div>
                           <div class="flex justify-between"><span>Total Paid Kids:</span><span class="font-black">${paid}</span></div>`;
            
            const days = ["Mon","Tue","Wed","Thu","Fri"];
            s.innerHTML = days.map(d => {
                let count = kids.filter(k => k.days.includes(d)).length;
                return `<div class="text-[10px] font-bold uppercase">${d}: ${count}/20<div class="w-full bg-white/5 h-1 rounded mt-1"><div class="bg-yellow-500 h-full" style="width:${(count/20)*100}%"></div></div></div>`;
            }).join('');
        }

        function switchTab(t) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.getElementById('tab-' + t).classList.remove('hidden');
        }
