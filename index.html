<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ISD TABLE TENNIS | TERM 3 MASTER HUB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --isd-yellow: #FFD700; --isd-green: #228B22; --isd-green-light: #90EE90; --isd-red: #ff4d4d; }
        body { background: radial-gradient(circle at top left, #121212, #000000); color: white; font-family: 'Plus Jakarta Sans', sans-serif; min-height: 100vh; }
        .glass { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.08); backdrop-filter: blur(20px); }
        
        /* Attendance Dots */
        .dot { width: 14px; height: 14px; border-radius: 4px; border: 1px solid #333; cursor: pointer; transition: all 0.2s; }
        .dot.present { background: var(--isd-green); box-shadow: 0 0 10px var(--isd-green); border-color: transparent; }
        .dot.absent { background: var(--isd-red); box-shadow: 0 0 10px var(--isd-red); border-color: transparent; }
        
        /* Row Statuses */
        .status-invited { background: rgba(255, 215, 0, 0.08) !important; border-left: 4px solid var(--isd-yellow); }
        .status-confirmed { background: rgba(144, 238, 144, 0.08) !important; border-left: 4px solid var(--isd-green-light); }
        .status-paid { background: rgba(34, 139, 34, 0.15) !important; border-left: 4px solid var(--isd-green); border-right: 1px solid var(--isd-green); }

        .makeup-badge { background: var(--isd-red); color: white; font-size: 9px; padding: 2px 7px; border-radius: 12px; font-weight: 900; }
        .tab-btn { transition: 0.3s; border-bottom: 2px solid transparent; }
        .tab-btn.active { color: var(--isd-yellow); border-color: var(--isd-yellow); font-weight: 800; }
        
        @media (max-width: 768px) { .hide-mobile { display: none; } }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-[1440px] mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-6">
            <div class="space-y-1">
                <h1 class="text-3xl md:text-5xl font-black italic tracking-tighter uppercase">ISD <span class="text-yellow-500">TERM 3</span> TRACKER</h1>
                <p class="text-gray-500 text-[10px] font-bold tracking-[0.4em] ml-1">CREATED BY LEO | TABLE TENNIS ADMINISTRATION</p>
            </div>
            
            <nav class="flex gap-6 overflow-x-auto w-full md:w-auto glass p-2 rounded-2xl">
                <button onclick="switchTab('roster')" id="btn-roster" class="tab-btn active px-4 py-2 text-xs uppercase font-black">Roster</button>
                <button onclick="switchTab('makeup')" id="btn-makeup" class="tab-btn px-4 py-2 text-xs uppercase font-black">Makeups <span id="m-count-badge" class="makeup-badge ml-1">0</span></button>
                <button onclick="switchTab('report')" id="btn-report" class="tab-btn px-4 py-2 text-xs uppercase font-black">Management Report</button>
            </nav>
        </header>

        <main>
            <section id="tab-roster" class="space-y-4">
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
                    <div class="glass p-5 rounded-3xl border-b-2 border-yellow-500/50">
                        <p class="text-[9px] font-black uppercase text-gray-500 tracking-widest">Invited</p>
                        <h2 id="stat-invited" class="text-2xl font-black">0</h2>
                    </div>
                    <div class="glass p-5 rounded-3xl border-b-2 border-green-400/50">
                        <p class="text-[9px] font-black uppercase text-gray-500 tracking-widest">Confirmed</p>
                        <h2 id="stat-confirmed" class="text-2xl font-black">0</h2>
                    </div>
                    <div class="glass p-5 rounded-3xl border-b-2 border-green-600">
                        <p class="text-[9px] font-black uppercase text-gray-500 tracking-widest">Paid (ISDB DONE)</p>
                        <h2 id="stat-paid" class="text-2xl font-black">0</h2>
                    </div>
                    <div class="glass p-5 rounded-3xl">
                        <p class="text-[9px] font-black uppercase text-gray-500 tracking-widest">Total Revenue</p>
                        <h2 id="stat-revenue" class="text-2xl font-black text-green-400">0 AED</h2>
                    </div>
                </div>

                <div class="glass rounded-[2rem] overflow-hidden">
                    <div class="p-5 flex flex-wrap gap-4 items-center justify-between border-b border-white/5">
                        <div class="relative w-full md:w-96">
                            <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-600"></i>
                            <input type="text" id="search" onkeyup="render()" placeholder="Search Student or Phone..." class="w-full bg-black/40 border border-white/10 rounded-xl py-3 pl-12 pr-4 outline-none focus:border-yellow-500">
                        </div>
                        <button onclick="exportToExcel()" class="bg-[#217346] px-6 py-3 rounded-xl font-black text-[10px] uppercase tracking-widest hover:brightness-110 transition">📊 Export Final Roster</button>
                    </div>

                    <div class="hidden md:grid grid-cols-12 gap-4 p-4 text-[10px] font-black uppercase text-gray-500 border-b border-white/5 bg-white/5">
                        <div class="col-span-3">Student / Parent</div>
                        <div class="col-span-2 text-center">Schedule</div>
                        <div class="col-span-2 text-center">Attendance (M-F)</div>
                        <div class="col-span-5 text-right">Action Status Tracking</div>
                    </div>
                    <div id="roster-list" class="divide-y divide-white/5"></div>
                </div>
            </section>

            <section id="tab-makeup" class="hidden space-y-6">
                <div class="max-w-4xl mx-auto">
                    <div class="flex items-center gap-3 mb-6">
                        <div class="h-8 w-2 bg-red-600"></div>
                        <h2 class="text-2xl font-black italic uppercase">Owed Lessons List</h2>
                    </div>
                    <div id="makeup-list" class="grid gap-4"></div>
                </div>
            </section>

            <section id="tab-report" class="hidden">
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                    <div class="glass p-10 rounded-[3rem]">
                        <h3 class="text-xl font-black uppercase italic mb-8 flex items-center gap-3"><i class="fas fa-chart-line text-yellow-500"></i> Finance Summary</h3>
                        <div id="rep-finance" class="space-y-6 text-lg"></div>
                    </div>
                    <div class="glass p-10 rounded-[3rem]">
                        <h3 class="text-xl font-black uppercase italic mb-8 flex items-center gap-3"><i class="fas fa-users text-blue-500"></i> Weekly Slot Load</h3>
                        <div id="rep-slots" class="space-y-4"></div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script>
        const PRICES = { 1: 1695, 2: 3220, 3: 4830 };
        
        let students = [
            { id: 1, name: "Musa Junego", pName: "Reena Babar", pPhone: "971547773836", days: ["Mon"], time: "4:00-5:00 PM", status: 'Pending', att: [0,0,0,0,0], makeups: 0 },
            { id: 2, name: "Samuel Greiner", pName: "Patrick / Miriam", pPhone: "971507588134", days: ["Mon", "Fri"], time: "4:00-5:00 PM", status: 'Pending', att: [0,0,0,0,0], makeups: 0 },
            { id: 3, name: "Ishaan Kumar", pName: "Ashish Kumar", pPhone: "971522976720", days: ["Tue", "Thu"], time: "4:00-5:00 PM", status: 'Pending', att: [0,0,0,0,0], makeups: 0 },
            { id: 53, name: "Aydan Tejani", pName: "Zhara Tejani", pPhone: "447557118196", days: ["Thu"], time: "5:00-6:00 PM", status: 'Pending', att: [0,0,0,0,0], makeups: 0 }
            // All other 49 kids go here
        ];

        function switchTab(t) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.getElementById(`tab-${t}`).classList.remove('hidden');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn-${t}`).classList.add('active');
            if(t === 'report') generateReport();
            if(t === 'makeup') renderMakeups();
        }

        function cycleAtt(sId, dIdx) {
            const s = students.find(x => x.id === sId);
            if (s.att[dIdx] === 0) s.att[dIdx] = 1; // Present
            else if (s.att[dIdx] === 1) { s.att[dIdx] = 2; s.makeups++; } // Absent
            else { s.att[dIdx] = 0; s.makeups = Math.max(0, s.makeups - 1); } // Reset
            render();
        }

        function updateStatus(id, stat) {
            students.find(x => x.id === id).status = stat;
            render();
        }

        function sendInvite(id) {
            const s = students.find(x => x.id === id);
            const msg = `Hi ${s.pName}, we're inviting ${s.name} for ISD Table Tennis Term 3! Schedule: ${s.days.join('/')} at ${s.time}. Please confirm!`;
            window.open(`https://wa.me/${s.pPhone}?text=${encodeURIComponent(msg)}`, '_blank');
            updateStatus(id, 'Invited');
        }

        function askAleksey(id) {
            const s = students.find(x => x.id === id);
            const msg = `GROUP UPDATE: Requesting change for ${s.name} Term 3. Preferred day/time? @Coach Aleksey`;
            window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
        }

        function render() {
            const list = document.getElementById('roster-list');
            const q = document.getElementById('search').value.toLowerCase();
            list.innerHTML = '';
            
            let stats = { invited:0, confirmed:0, paid:0, rev:0, m:0 };

            students.forEach(s => {
                if(s.status === 'Invited') stats.invited++;
                if(s.status === 'Confirmed') stats.confirmed++;
                if(s.status === 'Paid') { stats.paid++; stats.rev += PRICES[s.days.length] || 0; }
                stats.m += s.makeups;

                if(!s.name.toLowerCase().includes(q)) return;

                let rowClass = s.status === 'Invited' ? 'status-invited' : s.status === 'Confirmed' ? 'status-confirmed' : s.status === 'Paid' ? 'status-paid' : '';

                list.innerHTML += `
                    <div class="grid grid-cols-1 md:grid-cols-12 gap-4 p-4 items-center ${rowClass}">
                        <div class="col-span-3">
                            <h4 class="font-black uppercase text-sm italic tracking-tighter">${s.name}</h4>
                            <p class="text-[9px] text-gray-500 font-bold tracking-widest">${s.pName} | ${s.pPhone}</p>
                        </div>
                        <div class="col-span-2 text-center text-[10px] font-black text-yellow-600">
                            ${s.days.join('/')} @ ${s.time}
                        </div>
                        <div class="col-span-2 flex justify-center gap-2">
                            ${s.att.map((v, i) => `<div onclick="cycleAtt(${s.id}, ${i})" class="dot ${v===1?'present':v===2?'absent':''}"></div>`).join('')}
                        </div>
                        <div class="col-span-5 flex justify-end gap-1">
                            <button onclick="sendInvite(${s.id})" class="px-2 py-1 bg-blue-600 rounded text-[8px] font-black uppercase">Invite</button>
                            <button onclick="askAleksey(${s.id})" class="px-2 py-1 bg-white/10 rounded text-[8px] font-black uppercase">Change?</button>
                            <button onclick="updateStatus(${s.id}, 'Confirmed')" class="px-2 py-1 border border-green-400 text-green-400 rounded text-[8px] font-black uppercase">Yes, Lock it</button>
                            <button onclick="updateStatus(${s.id}, 'Paid')" class="px-2 py-1 bg-green-600 text-black rounded text-[8px] font-black uppercase">Paid/Done</button>
                        </div>
                    </div>`;
            });

            document.getElementById('stat-invited').innerText = stats.invited;
            document.getElementById('stat-confirmed').innerText = stats.confirmed;
            document.getElementById('stat-paid').innerText = stats.paid;
            document.getElementById('stat-revenue').innerText = stats.rev.toLocaleString() + ' AED';
            document.getElementById('m-count-badge').innerText = stats.m;
        }

        function renderMakeups() {
            const container = document.getElementById('makeup-list');
            container.innerHTML = '';
            const owed = students.filter(s => s.makeups > 0);
            
            if(owed.length === 0) {
                container.innerHTML = `<div class="glass p-20 text-center text-gray-500 font-black">ALL CLEAR: NO MAKEUPS OWED</div>`;
                return;
            }

            owed.forEach(s => {
                container.innerHTML += `
                    <div class="glass p-6 rounded-3xl flex justify-between items-center border-l-8 border-red-600">
                        <div>
                            <h3 class="font-black text-lg uppercase italic">${s.name}</h3>
                            <p class="text-xs text-red-400 font-bold uppercase tracking-widest">Owes ${s.makeups} Lessons to Coach Aleksey</p>
                        </div>
                        <div class="flex gap-3">
                            <button onclick="window.open('https://wa.me/${s.pPhone}?text=Hi, scheduling makeup for ${s.name}')" class="bg-green-600 text-white w-10 h-10 rounded-full flex items-center justify-center"><i class="fab fa-whatsapp"></i></button>
                            <button onclick="clearM(${s.id})" class="bg-white text-black font-black px-6 py-2 rounded-xl text-xs uppercase">Clear 1 Lesson</button>
                        </div>
                    </div>`;
            });
        }

        function clearM(id) {
            const s = students.find(x => x.id === id);
            s.makeups = Math.max(0, s.makeups - 1);
            renderMakeups();
            render();
        }

        function generateReport() {
            const f = document.getElementById('rep-finance');
            const s = document.getElementById('rep-slots');
            
            let paidCount = students.filter(x => x.status === 'Paid').length;
            let confCount = students.filter(x => x.status === 'Confirmed').length;
            let rev = students.filter(x => x.status === 'Paid').reduce((a, b) => a + (PRICES[b.days.length]||0), 0);

            f.innerHTML = `
                <div class="flex justify-between border-b border-white/5 pb-4"><span>Confirmed Attendance</span><span class="font-black">${confCount}</span></div>
                <div class="flex justify-between border-b border-white/5 pb-4 text-green-400"><span>Paid & ISDB Done</span><span class="font-black">${paidCount}</span></div>
                <div class="flex justify-between text-3xl font-black pt-4 text-yellow-500 italic"><span>Revenue</span><span>${rev.toLocaleString()} AED</span></div>
            `;

            const dNames = ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday"];
            const counts = [0,0,0,0,0];
            students.forEach(kid => {
                if(kid.days.includes("Mon")) counts[0]++;
                if(kid.days.includes("Tue")) counts[1]++;
                if(kid.days.includes("Wed")) counts[2]++;
                if(kid.days.includes("Thu")) counts[3]++;
                if(kid.days.includes("Fri")) counts[4]++;
            });

            s.innerHTML = dNames.map((day, i) => `
                <div class="space-y-2">
                    <div class="flex justify-between text-[10px] font-black uppercase tracking-widest"><span>${day}</span><span>${counts[i]} / 20 Slots</span></div>
                    <div class="w-full bg-white/5 h-2 rounded-full overflow-hidden">
                        <div class="bg-yellow-500 h-full" style="width: ${(counts[i]/20)*100}%"></div>
                    </div>
                </div>
            `).join('');
        }

        function exportToExcel() {
            let csv = "Student Name,Parent,Phone,Days,Time,Status,Owed Makeups\n";
            students.forEach(s => { csv += `"${s.name}","${s.pName}","${s.pPhone}","${s.days.join('/')}","${s.time}","${s.status}","${s.makeups}"\n`; });
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `ISD_Term3_Official_Roster.csv`;
            a.click();
        }

        render();
    </script>
</body>
</html>
