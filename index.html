<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISD TABLE TENNIS SYSTEM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        :root { --isd-yellow: #eab308; --isd-pink: #f472b6; --isd-blue: #3b82f6; }
        body { background: #000; color: #eee; font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
        .frame-u8 { border: 3px solid var(--isd-pink); box-shadow: 0 0 15px rgba(244, 114, 182, 0.3); }
        .frame-u12 { border: 3px solid var(--isd-yellow); box-shadow: 0 0 15px rgba(234, 179, 8, 0.3); }
        .frame-u16 { border: 3px solid var(--isd-blue); box-shadow: 0 0 15px rgba(59, 130, 246, 0.3); }
        .isd-card { background: #0a0a0a; border-radius: 20px; border: 1px solid #1a1a1a; transition: 0.3s; }
        .btn-present { background: #166534; color: #fff; }
        .btn-absent { background: #991b1b; color: #fff; }
        .btn-medical { background: #1e40af; color: #fff; }
        .hidden { display: none; }
        #loginOverlay { background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%); }
    </style>
</head>
<body class="p-2 md:p-6">

    <div id="loginOverlay" class="fixed inset-0 z-[100] flex items-center justify-center p-6">
        <div class="max-w-md w-full text-center">
            <h1 class="text-4xl font-black text-yellow-500 italic mb-8 uppercase tracking-tighter">ISD SYSTEM ACCESS</h1>
            <input type="password" id="passcode" placeholder="ENTER AUTHORIZED NAME" class="w-full p-5 bg-neutral-900 border border-neutral-800 rounded-2xl text-center font-bold tracking-widest text-white outline-none focus:border-yellow-500">
            <button onclick="checkAuth()" class="w-full mt-4 bg-yellow-500 text-black font-black py-4 rounded-2xl uppercase italic">Unlock Terminal</button>
            <p id="loginError" class="text-red-500 text-[10px] mt-4 font-bold uppercase hidden">Access Denied: Name not in Authorized Registry</p>
        </div>
    </div>

    <div id="mainUI" class="max-w-[1800px] mx-auto hidden">
        <header class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
            <div>
                <h1 class="text-3xl font-black text-yellow-500 italic uppercase">ISD TABLE TENNIS TRACKER</h1>
                <p id="userRoleDisplay" class="text-[10px] font-bold text-gray-500 uppercase tracking-widest"></p>
            </div>
            <div class="flex gap-2">
                <button onclick="currentView='roster'; render()" class="px-6 py-3 bg-neutral-900 text-xs font-black uppercase rounded-xl">Roster</button>
                <button onclick="currentView='attendance'; render()" class="px-6 py-3 bg-neutral-900 text-xs font-black uppercase rounded-xl">Attendance</button>
                <button id="adminAddBtn" onclick="openReg()" class="px-6 py-3 bg-yellow-500 text-black font-black uppercase rounded-xl hidden">Add Entry</button>
            </div>
        </header>

        <div id="statsBar" class="grid grid-cols-2 md:grid-cols-5 gap-2 mb-6"></div>

        <div id="viewContainer"></div>
    </div>

    <div id="regModal" class="fixed inset-0 bg-black/95 z-[110] hidden flex items-center justify-center p-4">
        <div id="modalFrame" class="bg-neutral-900 p-8 rounded-[40px] w-full max-w-2xl border-4 border-neutral-800">
            <h2 class="text-2xl font-black text-yellow-500 mb-6 uppercase italic">Term 3 Registration</h2>
            <form onsubmit="saveNewKid(event)" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input type="text" id="nkName" placeholder="KIDS FULL NAME" required class="p-4 bg-black border border-neutral-800 rounded-xl outline-none">
                <input type="date" id="nkDob" onchange="updateModalLogic()" required class="p-4 bg-white text-black font-bold rounded-xl">
                <input type="text" id="npName" placeholder="PARENTS NAME" required class="p-4 bg-black border border-neutral-800 rounded-xl">
                <input type="tel" id="npPhone" placeholder="CONTACT (971...)" required class="p-4 bg-black border border-neutral-800 rounded-xl">
                
                <div class="col-span-full grid grid-cols-2 gap-4 bg-black p-4 rounded-2xl border border-neutral-800">
                    <div>
                        <label class="text-[9px] font-bold text-gray-500 uppercase">Start Date</label>
                        <input type="date" id="startDate" value="2026-03-30" onchange="updateModalLogic()" class="w-full bg-neutral-900 p-2 rounded mt-1">
                    </div>
                    <div>
                        <label class="text-[9px] font-bold text-gray-500 uppercase">End Date</label>
                        <input type="date" id="endDate" value="2026-07-03" onchange="updateModalLogic()" class="w-full bg-neutral-900 p-2 rounded mt-1">
                    </div>
                </div>

                <div class="col-span-full flex justify-between items-center px-2">
                    <span class="text-[10px] font-bold text-gray-400 uppercase">Pro-Rated Total:</span>
                    <span id="liveFee" class="text-xl font-black text-yellow-500">0 AED</span>
                </div>
                
                <button type="submit" class="col-span-full bg-yellow-500 text-black font-black py-4 rounded-2xl uppercase">Submit Registration</button>
            </form>
        </div>
    </div>

    <script>
        const ROLES = {
            'LEO': 'ADMIN', 
            'DIEGO': 'ADMIN', 'VANESSA': 'ADMIN', 'JOY': 'ADMIN', 'CHRISTINE': 'ADMIN', 'TIMA': 'ADMIN', 'RAFA': 'ADMIN',
            'ALXEY': 'COACH', 'YULIA': 'COACH', 'SARAH': 'COACH'
        };

        const RATES = { 'U8': 1390/14, 'U12': 1695/14, 'U16': 1695/14 }; // Weekly rate base
        let currentUser = null;
        let currentView = 'roster';
        let students = JSON.parse(localStorage.getItem('isd_ultimate_v8')) || [];

        function checkAuth() {
            const val = document.getElementById('passcode').value.toUpperCase();
            if (ROLES[val]) {
                currentUser = ROLES[val];
                document.getElementById('loginOverlay').classList.add('hidden');
                document.getElementById('mainUI').classList.remove('hidden');
                document.getElementById('userRoleDisplay').innerText = `ACCESS LEVEL: ${currentUser} | USER: ${val}`;
                if (currentUser === 'ADMIN') document.getElementById('adminAddBtn').classList.remove('hidden');
                render();
            } else {
                document.getElementById('loginError').classList.remove('hidden');
            }
        }

        function calculateProRated(dob, start, end) {
            const grp = calculateAgeGrp(dob);
            const d1 = new Date(start);
            const d2 = new Date(end);
            const diffTime = Math.abs(d2 - d1);
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            const weeks = Math.ceil(diffDays / 7);
            const base = (grp === 'U8') ? 1390 : 1695;
            // (Base Fee / 14 weeks) * number of weeks enrolled
            return Math.round((base / 14) * weeks);
        }

        function calculateAgeGrp(dob) {
            const age = new Date().getFullYear() - new Date(dob).getFullYear();
            return age < 8 ? 'U8' : (age < 12 ? 'U12' : 'U16');
        }

        function save() {
            localStorage.setItem('isd_ultimate_v8', JSON.stringify(students));
            render();
        }

        function markAttendance(kidId, date, status) {
            const s = students.find(x => x.id === kidId);
            if (!s.attendance) s.attendance = {};
            s.attendance[date] = status;
            
            if (status === 'medical') {
                s.makeups = (s.makeups || 0) + 1;
            }
            save();
        }

        function render() {
            const container = document.getElementById('viewContainer');
            container.innerHTML = '';

            if (currentView === 'roster') {
                renderRoster(container);
            } else {
                renderAttendance(container);
            }
            updateStats();
        }

        function renderRoster(container) {
            // Grouping: Paid list first as requested
            const sorted = [...students].sort((a,b) => (b.isdb && b.status === 'paid') ? 1 : -1);
            
            let html = `<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">`;
            sorted.forEach(s => {
                const grp = calculateAgeGrp(s.dob);
                const isPaid = s.isdb && s.status === 'paid';
                html += `
                    <div class="isd-card p-6 frame-${grp.toLowerCase()} ${isPaid ? 'border-green-500' : ''}">
                        <div class="flex justify-between items-start">
                            <h3 class="text-xl font-black uppercase italic">${s.name}</h3>
                            <span class="text-[10px] font-black ${isPaid ? 'text-green-500' : 'text-red-500'} uppercase">${isPaid ? 'PAID & ISDB' : 'UNPAID'}</span>
                        </div>
                        <p class="text-[10px] text-gray-500 font-bold uppercase mt-1">Makeups Available: <span class="text-blue-400">${s.makeups || 0}</span></p>
                        <div class="mt-4 pt-4 border-t border-white/5 flex justify-between items-center">
                            <span class="text-xs font-black text-yellow-500">${s.fee} AED</span>
                            <span class="text-[9px] font-bold text-gray-600 uppercase">${s.startDate} to ${s.endDate}</span>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html + `</div>`;
        }

        function renderAttendance(container) {
            const today = new Date().toISOString().split('T')[0];
            let html = `
                <div class="bg-neutral-900 rounded-3xl p-6 overflow-x-auto">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="text-[10px] text-gray-500 uppercase border-b border-white/5">
                                <th class="pb-4">Student</th>
                                <th class="pb-4">Schedule</th>
                                <th class="pb-4">Today (${today})</th>
                                <th class="pb-4">Makeups</th>
                            </tr>
                        </thead>
                        <tbody class="text-sm">
            `;

            students.forEach(s => {
                const status = (s.attendance && s.attendance[today]) || null;
                html += `
                    <tr class="border-b border-white/5">
                        <td class="py-4 font-black uppercase italic">${s.name}</td>
                        <td class="py-4 text-xs text-gray-500 uppercase">${s.schedule || 'TBD'}</td>
                        <td class="py-4 flex gap-1">
                            <button onclick="markAttendance(${s.id}, '${today}', 'present')" class="px-3 py-1 rounded text-[8px] font-bold uppercase ${status==='present'?'btn-present':'bg-neutral-800'}">P</button>
                            <button onclick="markAttendance(${s.id}, '${today}', 'absent')" class="px-3 py-1 rounded text-[8px] font-bold uppercase ${status==='absent'?'btn-absent':'bg-neutral-800'}">A</button>
                            <button onclick="markAttendance(${s.id}, '${today}', 'medical')" class="px-3 py-1 rounded text-[8px] font-bold uppercase ${status==='medical'?'btn-medical':'bg-neutral-800'}">Med</button>
                        </td>
                        <td class="py-4 font-black text-blue-400">${s.makeups || 0}</td>
                    </tr>
                `;
            });
            container.innerHTML = html + `</tbody></table></div>`;
        }

        function updateStats() {
            const bar = document.getElementById('statsBar');
            const stats = { 
                rev: students.reduce((a,b) => a + (b.status === 'paid' ? b.fee : 0), 0),
                count: students.length,
                unpaid: students.filter(s => s.status !== 'paid').length,
                makeups: students.reduce((a,b) => a + (b.makeups || 0), 0)
            };
            bar.innerHTML = `
                <div class="isd-card p-4 text-center"><p class="text-[8px] font-bold text-gray-500 uppercase">Revenue</p><h4 class="text-lg font-black text-green-500">${stats.rev} AED</h4></div>
                <div class="isd-card p-4 text-center"><p class="text-[8px] font-bold text-gray-500 uppercase">Total Kids</p><h4 class="text-lg font-black text-yellow-500">${stats.count}</h4></div>
                <div class="isd-card p-4 text-center"><p class="text-[8px] font-bold text-gray-500 uppercase">Unpaid</p><h4 class="text-lg font-black text-red-500">${stats.unpaid}</h4></div>
                <div class="isd-card p-4 text-center"><p class="text-[8px] font-bold text-gray-500 uppercase">Total Makeups</p><h4 class="text-lg font-black text-blue-500">${stats.makeups}</h4></div>
            `;
        }

        function updateModalLogic() {
            const dob = document.getElementById('nkDob').value;
            const start = document.getElementById('startDate').value;
            const end = document.getElementById('endDate').value;
            if (dob && start && end) {
                const fee = calculateProRated(dob, start, end);
                document.getElementById('liveFee').innerText = fee + " AED";
            }
        }

        function saveNewKid(e) {
            e.preventDefault();
            const dob = document.getElementById('nkDob').value;
            const start = document.getElementById('startDate').value;
            const end = document.getElementById('endDate').value;
            students.push({
                id: Date.now(),
                name: document.getElementById('nkName').value,
                dob: dob,
                pName: document.getElementById('npName').value,
                phone: document.getElementById('npPhone').value,
                startDate: start,
                endDate: end,
                fee: calculateProRated(dob, start, end),
                status: 'pending',
                isdb: false,
                attendance: {},
                makeups: 0
            });
            save();
            closeReg();
            alert("Registration Submitted Successfully.");
        }

        function openReg() { document.getElementById('regModal').classList.remove('hidden'); }
        function closeReg() { document.getElementById('regModal').classList.add('hidden'); }
    </script>
</body>
</html>
