<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISD TABLE TENNIS TERM TRACKER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        :root { --isd-yellow: #eab308; --isd-pink: #f472b6; --isd-blue: #3b82f6; }
        body { background: #050505; color: #eee; font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; overflow-x: hidden; }
        
        /* Strict Neon Frames */
        .frame-u8 { border: 4px solid var(--isd-pink); box-shadow: 0 0 20px rgba(244, 114, 182, 0.4); }
        .frame-u12 { border: 4px solid var(--isd-yellow); box-shadow: 0 0 20px rgba(234, 179, 8, 0.4); }
        .frame-u16 { border: 4px solid var(--isd-blue); box-shadow: 0 0 20px rgba(59, 130, 246, 0.4); }
        .frame-isdb { border: 4px solid #fbbf24 !important; background: linear-gradient(145deg, #064e3b, #022c22) !important; box-shadow: 0 0 30px #fbbf24 !important; }

        .bday-month { border-style: dashed !important; animation: border-pulse 2s infinite; }
        @keyframes border-pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }

        .status-joining { background: var(--isd-yellow) !important; color: #000 !important; font-weight: 900; }
        .status-paid { background: #22c55e !important; color: #fff !important; font-weight: 900; }
        
        .stat-card { background: #111; border: 1px solid #222; border-radius: 16px; padding: 1rem; transition: all 0.3s ease; }
        .stat-card:hover { border-color: var(--isd-yellow); transform: translateY(-2px); }

        /* Registration Form Specifics */
        .isd-input { background: #000; border: 1px solid #333; color: #fff; padding: 1rem; border-radius: 12px; outline: none; transition: 0.3s; }
        .isd-input:focus { border-color: var(--isd-yellow); box-shadow: 0 0 10px var(--isd-yellow); }
        
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); }

        .opt-btn { background: #1a1a1a; color: #888; border: 1px solid #333; padding: 0.5rem; border-radius: 8px; font-size: 10px; font-weight: bold; }
        .opt-btn.active { background: var(--isd-yellow); color: #000; border-color: #fff; }
    </style>
</head>
<body class="p-4 lg:p-10">

    <div class="max-w-[1700px] mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-10 gap-6">
            <div>
                <h1 class="text-4xl lg:text-7xl font-black text-yellow-500 italic uppercase leading-none tracking-tighter">ISD TABLE TENNIS TERM TRACKER</h1>
                <p class="text-xs font-bold text-gray-500 mt-3 tracking-[0.4em] uppercase">created by Leo for ISD Racket Sports</p>
            </div>
            <div class="flex items-center gap-6">
                <button onclick="openReg()" class="bg-yellow-500 text-black font-black w-16 h-16 rounded-full text-3xl shadow-2xl hover:scale-110 transition-transform flex items-center justify-center">+</button>
            </div>
        </header>

        <div id="statsMatrix" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 xl:grid-cols-11 gap-3 mb-10"></div>

        <div class="flex flex-col lg:flex-row gap-4 mb-8">
            <input type="text" id="search" onkeyup="render()" placeholder="Search by Student or Parent..." class="flex-1 bg-neutral-900 p-5 rounded-2xl border border-neutral-800 outline-none text-white focus:border-yellow-500">
            <div class="flex gap-2">
                <button onclick="currentTab='active'; render()" class="px-8 py-4 bg-yellow-500 text-black font-black rounded-2xl text-[10px] uppercase">Active</button>
                <button onclick="currentTab='vault'; render()" class="px-8 py-4 bg-neutral-900 text-gray-400 font-black rounded-2xl text-[10px] uppercase border border-neutral-800">Vault</button>
            </div>
        </div>

        <div id="mainGrid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-8"></div>
    </div>

    <div id="regModal" class="fixed inset-0 bg-black/95 backdrop-blur-xl hidden z-50 flex items-center justify-center p-4">
        <div id="modalFrame" class="bg-neutral-900 p-10 rounded-[40px] w-full max-w-3xl border-4 transition-all duration-700">
            <h2 class="text-4xl font-black text-yellow-500 mb-8 uppercase italic tracking-tighter">Student Registration</h2>
            <form onsubmit="saveNewKid(event)" class="grid grid-cols-1 md:grid-cols-2 gap-5">
                <div class="flex flex-col gap-2">
                    <label class="text-[10px] font-bold text-gray-500 uppercase ml-2">Kids Full Name</label>
                    <input type="text" id="nkName" required class="isd-input">
                </div>
                <div class="flex flex-col gap-2">
                    <label class="text-[10px] font-bold text-gray-500 uppercase ml-2">Date of Birth</label>
                    <input type="date" id="nkDob" onchange="updateModalLogic()" required class="isd-input">
                </div>
                <div class="flex flex-col gap-2">
                    <label class="text-[10px] font-bold text-gray-500 uppercase ml-2">Parents Full Name</label>
                    <input type="text" id="npName" required class="isd-input">
                </div>
                <div class="flex flex-col gap-2">
                    <label class="text-[10px] font-bold text-gray-500 uppercase ml-2">Contact Number</label>
                    <input type="tel" id="npPhone" required class="isd-input" placeholder="971...">
                </div>
                <div class="col-span-full flex flex-col gap-2">
                    <label class="text-[10px] font-bold text-gray-500 uppercase ml-2">Email Address</label>
                    <input type="email" id="npEmail" required class="isd-input">
                </div>
                
                <div class="col-span-full bg-black/50 p-6 rounded-3xl border border-white/5">
                    <p class="text-[10px] font-bold text-yellow-500 uppercase mb-4">Select Schedule Slots</p>
                    <div id="schedBuilder" class="grid grid-cols-4 gap-2 mb-4">
                        </div>
                    <div class="flex justify-between items-center pt-4 border-t border-white/5">
                        <span class="text-xs font-bold text-gray-400">ESTIMATED TERM FEE:</span>
                        <span id="liveFee" class="text-2xl font-black text-yellow-500">0 AED</span>
                    </div>
                </div>

                <button type="submit" class="col-span-full bg-yellow-500 text-black font-black py-6 rounded-3xl uppercase text-xl shadow-2xl shadow-yellow-500/20">Register Student</button>
                <button type="button" onclick="closeReg()" class="col-span-full text-gray-600 text-[10px] uppercase font-bold text-center">Back to Dashboard</button>
            </form>
        </div>
    </div>

    <script>
        const RATES = { 'U8': [0, 1390, 2645, 3962, 5200], 'U12': [0, 1695, 3220, 4830, 6000], 'U16': [0, 1695, 3220, 4830, 6000] };
        const TERM_START = "2026-03-30";
        const TERM_END = "2026-07-03";

        // Persistent Registry
        let students = JSON.parse(localStorage.getItem('isd_pro_v7')) || [];
        let currentTab = 'active';
        let selectedDays = [];

        function calculateAgeGrp(dob) {
            const age = new Date().getFullYear() - new Date(dob).getFullYear();
            return age < 8 ? 'U8' : (age < 12 ? 'U12' : 'U16');
        }

        function getAge(dob) {
            return new Date().getFullYear() - new Date(dob).getFullYear();
        }

        function calculateFee(dob, dayCount) {
            const grp = calculateAgeGrp(dob);
            return RATES[grp][dayCount] || RATES[grp][1];
        }

        function save() {
            localStorage.setItem('isd_pro_v7', JSON.stringify(students));
            render();
        }

        function render() {
            const grid = document.getElementById('mainGrid');
            const query = document.getElementById('search').value.toLowerCase();
            grid.innerHTML = '';

            const filtered = students.filter(s => 
                (s.name.toLowerCase().includes(query) || s.pName.toLowerCase().includes(query)) && 
                (currentTab === 'active' ? !s.vault : s.vault)
            );

            filtered.forEach(s => {
                const grp = calculateAgeGrp(s.dob);
                const bday = new Date(s.dob);
                const today = new Date();
                const isBdayMonth = bday.getMonth() === today.getMonth();
                const isBdayToday = isBdayMonth && bday.getDate() === today.getDate();
                
                grid.innerHTML += `
                    <div class="stat-card frame-${grp.toLowerCase()} ${s.isdb ? 'frame-isdb' : ''} ${isBdayMonth ? 'bday-month' : ''} relative">
                        ${isBdayToday ? '<div class="absolute -top-4 left-1/2 -translate-x-1/2 bg-pink-500 text-white text-[9px] font-black px-5 py-2 rounded-full uppercase italic shadow-xl">🎂 Birthday Wishes from ISD Family!</div>' : ''}
                        
                        <div class="flex justify-between items-start mb-6">
                            <div>
                                <h3 class="text-2xl font-black uppercase italic leading-none">${s.name}</h3>
                                <p class="text-[10px] font-bold text-gray-400 mt-2 uppercase">DOB: ${s.dob} • Age: ${getAge(s.dob)}</p>
                            </div>
                            <div class="text-right">
                                <p class="text-2xl font-black text-yellow-500 leading-none">${s.fee} AED</p>
                                <p class="text-[8px] font-bold text-gray-600 mt-1 uppercase">${s.paymentType || 'Unset'}</p>
                            </div>
                        </div>

                        <div class="bg-black/40 p-5 rounded-2xl mb-6 border border-white/5">
                            <p class="text-[11px] font-black text-white uppercase"><i class="fas fa-clock mr-3 text-yellow-500"></i>${s.schedule}</p>
                            <div class="mt-4 flex gap-2">
                                <button onclick="triggerRequest(${s.id})" class="text-[9px] font-black text-blue-400 uppercase border-b border-blue-400/30">+ Change Slot / Add Day</button>
                            </div>
                            <div id="request-zone-${s.id}" class="hidden mt-4 pt-4 border-t border-white/10">
                                <p class="text-[9px] font-bold text-gray-500 mb-2 uppercase italic">Choose New Day/Time:</p>
                                <div class="flex flex-wrap gap-1 mb-3" id="options-${s.id}"></div>
                                <button id="inform-${s.id}" onclick="informCoach(${s.id})" class="hidden w-full bg-blue-600 text-white font-black py-3 rounded-xl text-[10px] uppercase">Inform Coach (WhatsApp)</button>
                            </div>
                        </div>

                        <div class="grid grid-cols-3 gap-2">
                            <button onclick="sendWA(${s.id}, 'invite')" class="bg-neutral-800 p-3 rounded-xl text-[9px] font-black uppercase hover:bg-neutral-700 transition">Invite</button>
                            <button onclick="setStatus(${s.id}, 'joining')" class="p-3 rounded-xl text-[9px] font-black uppercase ${s.status==='joining'?'status-joining':'bg-neutral-800 text-gray-500'}">Joining</button>
                            <button onclick="setStatus(${s.id}, 'paid')" class="p-3 rounded-xl text-[9px] font-black uppercase ${s.status==='paid'?'status-paid':'bg-neutral-800 text-gray-500'}">Paid</button>
                            <button onclick="toggleISDB(${s.id})" class="col-span-full p-3 rounded-xl text-[9px] font-black uppercase ${s.isdb?'bg-yellow-600 text-black':'bg-blue-900/30 text-blue-400'} mt-1">Added on ISDB</button>
                        </div>
                    </div>
                `;
            });
            updateMatrix();
        }

        function updateMatrix() {
            const stats = { rev:0, reg:0, slots:0, new:0, no:0, isdb:0, paid:0, unpaid:0, cash:0, card:0, link:0 };
            students.forEach(s => {
                if(s.vault) { stats.no++; return; }
                if(s.status === 'paid' || s.isdb) { 
                    stats.rev += s.fee; 
                    stats.paid++;
                    if(s.paymentType === 'Cash') stats.cash += s.fee;
                    if(s.paymentType === 'Card') stats.card += s.fee;
                    if(s.paymentType === 'Link') stats.link += s.fee;
                } else { stats.unpaid++; }
                if(s.status === 'joining' || s.status === 'paid') stats.reg++;
                if(s.isdb) stats.isdb++;
                stats.slots += (s.schedule.match(/,/g) || []).length + 1;
            });

            const labels = [
                ["Revenue", stats.rev.toLocaleString(), "text-green-500"],
                ["Registered", stats.reg, "text-yellow-500"],
                ["Slots Taken", stats.slots, "text-blue-400"],
                ["ISDB", stats.isdb, "text-amber-500"],
                ["Paid", stats.paid, "text-green-400"],
                ["Unpaid", stats.unpaid, "text-red-500"],
                ["Vaulted", stats.no, "text-gray-500"],
                ["Cash", stats.cash.toLocaleString(), "text-emerald-500"],
                ["Card", stats.card.toLocaleString(), "text-sky-500"],
                ["Link", stats.link.toLocaleString(), "text-indigo-500"]
            ];

            const container = document.getElementById('statsMatrix');
            container.innerHTML = '';
            labels.forEach(l => {
                container.innerHTML += `<div class="stat-card"><p class="text-[8px] font-black text-gray-500 uppercase mb-1">${l[0]}</p><h4 class="text-lg font-black ${l[2]}">${l[1]}</h4></div>`;
            });
        }

        function sendWA(id, type) {
            const s = students.find(x => x.id == id);
            let msg = "";
            if(type === 'invite') {
                msg = `🏓 ISD Table Tennis Academy – Term 3 Invitation\n\nDear ${s.pName},\n\nWe are pleased to invite ${s.name} to join ISD Table Tennis Academy – Term 3.\n\n📅 Term Dates: 30 March – 3 July 2026\n🗓 Duration: 14 Weeks\n⏰ Schedule: ${s.schedule}\n📍 Location: ISD Table Tennis Academy\n\nKindly confirm ${s.name}’s participation to secure the spot.\n\nBest regards,\nISD Table Tennis Academy`;
            } else if (type === 'confirm') {
                msg = `🏓 ISD Table Tennis Academy – Term 3 Confirmation\n\nDear ${s.pName},\n\nThank you for confirming ${s.name}’s participation in ISD Table Tennis Academy – Term 3.\n\n📅 30 March – 3 July 2026 (14 Weeks)\n⏰ Schedule: ${s.schedule}\n\nWe look forward to seeing ${s.name} in the upcoming sessions.\n\nBest regards,\nISD Table Tennis Academy.`;
            }
            window.open(`https://wa.me/${s.phone}?text=${encodeURIComponent(msg)}`);
        }

        function triggerRequest(id) {
            const zone = document.getElementById(`request-zone-${id}`);
            zone.classList.toggle('hidden');
            const opts = document.getElementById(`options-${id}`);
            opts.innerHTML = '';
            ['Mon 4pm','Mon 5pm','Tue 4pm','Tue 5pm','Wed 4pm','Wed 5pm','Thu 4pm','Thu 5pm','Fri 3pm','Fri 4pm'].forEach(t => {
                opts.innerHTML += `<button onclick="selectOption(${id}, '${t}')" class="opt-btn">${t}</button>`;
            });
        }

        function selectOption(id, time) {
            const s = students.find(x => x.id == id);
            s.tempSlot = time;
            document.getElementById(`inform-${id}`).classList.remove('hidden');
        }

        function informCoach(id) {
            const s = students.find(x => x.id == id);
            const msg = `🏓 COACH APPROVAL REQUEST\nStudent: ${s.name}\nNew Slot Requested: ${s.tempSlot}\nPlease confirm if available.`;
            window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`);
            alert("Request sent to coach. Waiting for coach approval...");
            // Simulated Coach Agreement logic for demo
            setTimeout(() => {
                if(confirm("Coach agreed? Click OK to confirm to parent and update schedule.")) {
                    s.schedule = s.tempSlot;
                    s.fee = calculateFee(s.dob, 1);
                    save();
                    sendWA(id, 'confirm');
                }
            }, 1000);
        }

        function setStatus(id, st) {
            const s = students.find(x => x.id == id);
            s.status = st;
            if(st === 'joining') sendWA(id, 'confirm');
            save();
        }

        function toggleISDB(id) {
            const s = students.find(x => x.id == id);
            s.isdb = !s.isdb;
            if(s.isdb) s.status = 'paid';
            save();
        }

        function openReg() {
            document.getElementById('regModal').classList.remove('hidden');
            updateModalLogic();
        }

        function closeReg() {
            document.getElementById('regModal').classList.add('hidden');
        }

        function updateModalLogic() {
            const dob = document.getElementById('nkDob').value;
            const frame = document.getElementById('modalFrame');
            if(dob) {
                const grp = calculateAgeGrp(dob);
                frame.className = `bg-neutral-900 p-10 rounded-[40px] w-full max-w-3xl border-4 transition-all duration-700 frame-${grp.toLowerCase()}`;
                const fee = calculateFee(dob, selectedDays.length || 1);
                document.getElementById('liveFee').innerText = fee + " AED";
            }
        }

        function saveNewKid(e) {
            e.preventDefault();
            const dob = document.getElementById('nkDob').value;
            students.push({
                id: Date.now(),
                name: document.getElementById('nkName').value,
                dob: dob,
                pName: document.getElementById('npName').value,
                email: document.getElementById('npEmail').value,
                phone: document.getElementById('npPhone').value,
                schedule: "New Student (TBD)",
                fee: calculateFee(dob, 1),
                status: 'pending',
                vault: false,
                isdb: false,
                paymentType: 'Pending'
            });
            save();
            closeReg();
            alert("Registration Complete! Welcome to the ISD Family.");
        }

        render();
    </script>
</body>
</html>
