<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISD TABLE TENNIS TRACKER TERM 3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        
        :root {
            --u8-neon: #ff0055;
            --u12-neon: #eab308;
            --u16-neon: #0088ff;
            --joining-neon: #39ff14;
            --gold-isdb: #ffd700;
        }

        body {
            background-color: #000;
            color: #fff;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        .neon-border-u8 { border: 3px solid var(--u8-neon); box-shadow: 0 0 15px var(--u8-neon); }
        .neon-border-u12 { border: 3px solid var(--u12-neon); box-shadow: 0 0 15px var(--u12-neon); }
        .neon-border-u16 { border: 3px solid var(--u16-neon); box-shadow: 0 0 15px var(--u16-neon); }
        
        .kid-bullet {
            background: #0a0a0a;
            border: 1px solid #222;
            transition: all 0.3s ease;
        }
        .bullet-invitation-sent { border: 2px solid var(--u12-neon); box-shadow: inset 0 0 10px rgba(234, 179, 8, 0.2); }
        .bullet-joining { border: 2px solid var(--joining-neon); box-shadow: 0 0 10px var(--joining-neon); }
        .bullet-isdb { border: 2px solid var(--gold-isdb) !important; }

        .stat-card {
            background: #111;
            border: 1px solid #222;
            padding: 1rem;
            border-radius: 12px;
            text-align: center;
        }

        .isd-input {
            background: #000;
            border: 1px solid #333;
            color: #fff;
            padding: 12px;
            border-radius: 8px;
            width: 100%;
            outline: none;
        }
        .isd-input:focus { border-color: var(--u12-neon); }

        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1) sepia(100%) saturate(1000%) hue-rotate(10deg);
            cursor: pointer;
        }

        .hidden { display: none !important; }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-8">

    <!-- Auth Overlay -->
    <div id="loginOverlay" class="fixed inset-0 z-[200] bg-black flex items-center justify-center">
        <div class="max-w-md w-full p-8 text-center">
            <h1 class="text-4xl font-black text-yellow-500 italic mb-2">ISD TABLE TENNIS TRACKER</h1>
            <p class="text-[10px] text-gray-500 mb-8 tracking-[0.3em]">TERM 3 ACCESS ONLY</p>
            <input type="password" id="passcode" placeholder="ACCESS KEY" class="isd-input text-center text-2xl mb-4">
            <button onclick="handleLogin()" class="w-full bg-yellow-500 text-black font-black py-4 rounded-xl uppercase">Login</button>
        </div>
    </div>

    <!-- Main Terminal -->
    <div id="mainUI" class="max-w-[1800px] mx-auto hidden">
        <header class="mb-8">
            <h1 class="text-5xl font-black text-yellow-500 italic">ISD TABLE TENNIS TRACKER TERM 3</h1>
            <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest mt-1">created by Leo for ISD RACKET SPORTS</p>
            
            <div class="flex flex-wrap gap-4 mt-6">
                <button onclick="openModal('regModal')" class="px-6 py-3 bg-white text-black font-black rounded-lg text-xs uppercase">+ Register Kid</button>
                <button onclick="downloadCSV()" class="px-6 py-3 bg-neutral-800 text-white font-black rounded-lg text-xs uppercase"><i class="fa-solid fa-file-csv mr-2"></i>Backup CSV</button>
                <button onclick="generateReport('weekly')" class="px-6 py-3 bg-neutral-800 text-white font-black rounded-lg text-xs uppercase">Weekly Report</button>
                <button onclick="generateReport('term')" class="px-6 py-3 bg-neutral-800 text-white font-black rounded-lg text-xs uppercase">Term 3 Overall</button>
                <button onclick="setView('notJoining')" class="px-6 py-3 bg-red-900/20 text-red-500 font-black rounded-lg text-xs uppercase">Not Joining Folder</button>
                <button onclick="setView('roster')" class="px-6 py-3 bg-green-900/20 text-green-500 font-black rounded-lg text-xs uppercase">Main Roster</button>
            </div>
        </header>

        <!-- Statistic Grid -->
        <div id="statsGrid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-3 mb-10">
            <!-- Dynamic Stats Rendered Here -->
        </div>

        <div class="grid grid-cols-1 xl:grid-cols-4 gap-8">
            <!-- Main List -->
            <div class="xl:col-span-3">
                <div id="listHeader" class="flex justify-between items-center mb-4">
                    <h2 id="viewTitle" class="text-2xl font-black uppercase italic">Registered Kids</h2>
                    <div class="flex gap-2">
                        <select id="filterAge" onchange="render()" class="bg-black border border-neutral-800 text-xs p-2 rounded">
                            <option value="ALL">All Ages</option>
                            <option value="U8">U8</option>
                            <option value="U12">U12</option>
                            <option value="U16">U16</option>
                        </select>
                    </div>
                </div>
                <div id="kidsContainer" class="space-y-4"></div>
            </div>

            <!-- Sidebar Widgets -->
            <div class="space-y-6">
                <!-- Birthday Widget -->
                <div class="bg-neutral-900 p-6 rounded-2xl border border-neutral-800">
                    <h3 class="text-sm font-black text-yellow-500 uppercase mb-4"><i class="fa-solid fa-cake-candles mr-2"></i>Upcoming Birthdays</h3>
                    <div id="bdayWidget" class="space-y-3"></div>
                </div>

                <!-- Attendance Widget -->
                <div class="bg-neutral-900 p-6 rounded-2xl border border-neutral-800">
                    <h3 class="text-sm font-black text-blue-500 uppercase mb-4"><i class="fa-solid fa-clipboard-user mr-2"></i>Attendance Checker</h3>
                    <input type="date" id="attDate" class="isd-input text-xs mb-4" onchange="renderAttendance()">
                    <div id="attWidget" class="space-y-2"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Registration Modal -->
    <div id="regModal" class="fixed inset-0 bg-black/95 z-[150] hidden flex items-center justify-center p-4">
        <div id="modalFrame" class="bg-neutral-900 p-8 rounded-[30px] w-full max-w-4xl border-4 border-neutral-800 overflow-y-auto max-h-[90vh]">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-3xl font-black text-yellow-500 uppercase italic">Registration Form</h2>
                <button onclick="closeModal('regModal')" class="text-gray-500 text-2xl">&times;</button>
            </div>
            
            <form id="enrollForm" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="text-[10px] font-black text-gray-500 uppercase">Kids Full Name</label>
                    <input type="text" id="kName" required class="isd-input mt-1">
                </div>
                <div>
                    <label class="text-[10px] font-black text-gray-500 uppercase">Date of Birth</label>
                    <input type="date" id="kDob" required class="isd-input mt-1" onchange="handleDobChange()">
                </div>
                <div>
                    <label class="text-[10px] font-black text-gray-500 uppercase">Parents Name</label>
                    <input type="text" id="pName" required class="isd-input mt-1">
                </div>
                <div>
                    <label class="text-[10px] font-black text-gray-500 uppercase">WhatsApp Number</label>
                    <input type="tel" id="pPhone" required class="isd-input mt-1">
                </div>
                <div class="md:col-span-2">
                    <label class="text-[10px] font-black text-gray-500 uppercase">Email Address</label>
                    <input type="email" id="pEmail" required class="isd-input mt-1">
                </div>

                <div class="md:col-span-2 p-6 bg-black/50 rounded-2xl border border-white/5">
                    <div class="flex justify-between items-center mb-4">
                        <span id="popGroup" class="px-4 py-1 rounded-full text-[10px] font-black bg-neutral-800">GROUP: ---</span>
                        <span id="popAge" class="text-xs font-bold text-gray-400">AGE: --</span>
                    </div>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="text-[10px] font-black text-gray-500 uppercase">Schedule Days</label>
                            <div class="flex gap-2 mt-2">
                                <button type="button" onclick="setDay('Mon')" class="day-btn px-3 py-2 bg-neutral-800 rounded text-[10px] font-black">MON</button>
                                <button type="button" onclick="setDay('Tue')" class="day-btn px-3 py-2 bg-neutral-800 rounded text-[10px] font-black">TUE</button>
                                <button type="button" onclick="setDay('Wed')" class="day-btn px-3 py-2 bg-neutral-800 rounded text-[10px] font-black">WED</button>
                                <button type="button" onclick="setDay('Thu')" class="day-btn px-3 py-2 bg-neutral-800 rounded text-[10px] font-black">THU</button>
                                <button type="button" onclick="setDay('Fri')" class="day-btn px-3 py-2 bg-neutral-800 rounded text-[10px] font-black">FRI</button>
                            </div>
                        </div>
                        <div>
                            <label class="text-[10px] font-black text-gray-500 uppercase">Starting Date</label>
                            <input type="date" id="startDate" value="2026-03-30" class="isd-input mt-1 text-xs" onchange="calcTotal()">
                        </div>
                    </div>

                    <div class="mt-6 pt-6 border-t border-white/5 flex justify-between items-end">
                        <div>
                            <p class="text-[10px] font-black text-gray-500 uppercase">Estimated Total</p>
                            <h3 id="totalDisplay" class="text-4xl font-black text-yellow-500 italic">0 <span class="text-sm">AED</span></h3>
                        </div>
                        <div class="text-right text-[10px] text-gray-500">
                            <p id="freqText">Sessions: 0</p>
                            <p id="baseText">Base: 0 AED</p>
                        </div>
                    </div>
                </div>

                <button type="submit" class="md:col-span-2 bg-yellow-500 text-black font-black py-5 rounded-2xl uppercase italic text-lg">Confirm Registration</button>
                <button type="button" onclick="handleBulkImport()" class="md:col-span-2 bg-blue-600 text-white font-black py-3 rounded-2xl uppercase text-[10px]">Migrate Initial Kids List (53 Kids)</button>
            </form>
        </div>
    </div>

    <!-- Schedule Request Modal -->
    <div id="schedModal" class="fixed inset-0 bg-black/90 z-[160] hidden flex items-center justify-center">
        <div class="bg-neutral-900 p-8 rounded-3xl w-full max-w-md border border-neutral-800">
            <h2 class="text-xl font-black text-yellow-500 uppercase italic mb-6">Schedule Request</h2>
            <div class="grid grid-cols-2 gap-4 mb-6">
                <input type="text" id="reqDay" placeholder="New Day" class="isd-input">
                <input type="text" id="reqTime" placeholder="New Time" class="isd-input">
            </div>
            <button id="sendCoachBtn" class="w-full bg-green-500 text-black font-black py-4 rounded-xl uppercase">Ask Coach Aleksey</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, addDoc, updateDoc, deleteDoc, onSnapshot, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'isd-tt-term3-v1';

        // State
        let students = [];
        let view = 'roster'; // 'roster' or 'notJoining'
        let selectedDays = [];
        let currentKidId = null;

        // Login
        window.handleLogin = () => {
            if (document.getElementById('passcode').value.toUpperCase() === 'LEO') {
                document.getElementById('loginOverlay').classList.add('hidden');
                document.getElementById('mainUI').classList.remove('hidden');
                signInAnonymously(auth);
            }
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                const q = collection(db, 'artifacts', appId, 'public', 'data', 'students');
                onSnapshot(q, (snapshot) => {
                    students = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                    render();
                    renderAttendance();
                });
            }
        });

        // Registration Logic
        window.handleDobChange = () => {
            const dob = document.getElementById('kDob').value;
            const age = calculateAge(dob);
            const group = getGroup(age);
            const modalFrame = document.getElementById('modalFrame');
            
            document.getElementById('popAge').innerText = `AGE: ${age}`;
            document.getElementById('popGroup').innerText = `GROUP: ${group}`;
            
            modalFrame.className = `bg-neutral-900 p-8 rounded-[30px] w-full max-w-4xl border-4 overflow-y-auto max-h-[90vh] ` + 
                (group === 'U8' ? 'neon-border-u8' : group === 'U12' ? 'neon-border-u12' : 'neon-border-u16');
            
            calcTotal();
        };

        window.setDay = (day) => {
            if (selectedDays.includes(day)) selectedDays = selectedDays.filter(d => d !== day);
            else selectedDays.push(day);
            
            document.querySelectorAll('.day-btn').forEach(btn => {
                btn.classList.toggle('bg-yellow-500', selectedDays.includes(btn.innerText));
                btn.classList.toggle('text-black', selectedDays.includes(btn.innerText));
            });
            calcTotal();
        };

        window.calcTotal = () => {
            const dob = document.getElementById('kDob').value;
            const start = document.getElementById('startDate').value;
            if (!dob || !start) return;

            const age = calculateAge(dob);
            const group = getGroup(age);
            const basePrice = age < 8 ? 1390 : 1695;
            const sessionsPerWeek = selectedDays.length;
            
            // Term logic (14 weeks)
            const termEnd = new Date('2026-07-03');
            const startD = new Date(start);
            const diffTime = Math.max(0, termEnd - startD);
            const weeksLeft = Math.ceil(diffTime / (1000 * 60 * 60 * 24 * 7));
            
            let total = (basePrice / 14) * weeksLeft * (sessionsPerWeek || 1);
            if (sessionsPerWeek > 1) total = total * 0.9; // 10% multi-day discount

            document.getElementById('totalDisplay').innerHTML = `${Math.round(total)} <span class="text-sm">AED</span>`;
            document.getElementById('freqText').innerText = `Sessions: ${sessionsPerWeek} per week`;
            document.getElementById('baseText').innerText = `Base: ${basePrice} AED`;
        };

        // Student Handlers
        window.toggleStatus = async (id, field, value) => {
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'students', id);
            await updateDoc(docRef, { [field]: value });
        };

        window.openScheduleRequest = (id) => {
            currentKidId = id;
            openModal('schedModal');
            document.getElementById('sendCoachBtn').onclick = () => {
                const s = students.find(x => x.id === id);
                const day = document.getElementById('reqDay').value;
                const time = document.getElementById('reqTime').value;
                const msg = `Hi Coach @Aleksey 🏓\n${s.pName} is requesting a new schedule for ${s.name}.\nKindly confirm if it is possible, or suggest any other available slot for ${s.name}.\nThank you!`;
                window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`);
                closeModal('schedModal');
            };
        };

        window.sendInvite = async (id) => {
            const s = students.find(x => x.id === id);
            const msg = `Hello ${s.pName}! 🏓\nWe’re excited to welcome our players back for an amazing ISD Table Tennis – Term 3 filled with learning, energy, and fun!\nStudent: ${s.name}\nSchedule: ${s.schedule}\nTerm 3 Dates: 30th of March – 3rd of July\nPlease let us know if the same schedule works for Term 3.\nWe can’t wait to see ${s.name} back at the table for another fantastic term!`;
            window.open(`https://wa.me/${s.phone}?text=${encodeURIComponent(msg)}`);
            await toggleStatus(id, 'invitationSent', true);
            await toggleStatus(id, 'invitationDate', new Date().toISOString());
        };

        window.sendFollowUp = (id) => {
            const s = students.find(x => x.id === id);
            const msg = `Hi ${s.pName}! 🏓\nJust following up regarding ${s.name}’s schedule for ISD Table Tennis – Term 3.\nKindly confirm if the same schedule works, so we can secure the slot.\nLooking forward to your reply!\nThank you 😊`;
            window.open(`https://wa.me/${s.phone}?text=${encodeURIComponent(msg)}`);
        };

        window.sendBdayWish = (id) => {
            const s = students.find(x => x.id === id);
            const msg = `🎉 Birthday Wish 🎉\nHi ${s.pName}! 🥳\nYour champ ${s.name} has a special day coming up!\nWishing ${s.name} a very happy birthday filled with joy, laughter, and lots of fun! 🎂🎈\nFrom all of us at ISD Table Tennis, we hope it’s a fantastic year ahead for ${s.name}! 🏓💛`;
            window.open(`https://wa.me/${s.phone}?text=${encodeURIComponent(msg)}`);
        };

        // Attendance Logic
        window.markAttendance = async (id, status) => {
            const date = document.getElementById('attDate').value;
            const s = students.find(x => x.id === id);
            const att = s.attendance || {};
            const makeups = s.makeups || 0;
            
            const newMakeups = status === 'med' ? makeups + 1 : makeups;
            
            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'students', id), {
                [`attendance.${date}`]: status,
                makeups: newMakeups
            });
        };

        // Core Render
        function render() {
            const container = document.getElementById('kidsContainer');
            const ageFilter = document.getElementById('filterAge').value;
            
            const filtered = students.filter(s => {
                const inView = view === 'roster' ? (s.status !== 'notJoining') : (s.status === 'notJoining');
                const ageMatch = ageFilter === 'ALL' || getGroup(calculateAge(s.dob)) === ageFilter;
                return inView && ageMatch;
            });

            container.innerHTML = filtered.map(s => {
                const age = calculateAge(s.dob);
                const group = getGroup(age);
                const isBday = isBirthdaySoon(s.dob);
                const needsFollowUp = s.invitationSent && !s.status && (new Date() - new Date(s.invitationDate) > 86400000);

                return `
                    <div class="kid-bullet p-6 rounded-2xl flex flex-col md:flex-row justify-between items-start md:items-center gap-4 
                        ${s.invitationSent ? 'bullet-invitation-sent' : ''} 
                        ${s.status === 'joining' ? 'bullet-joining' : ''} 
                        ${s.status === 'paid' ? 'bullet-joining bg-green-500/5' : ''}
                        ${s.isdbDone ? 'bullet-isdb' : ''}">
                        
                        <div class="flex-1">
                            <div class="flex items-center gap-2">
                                <span class="w-2 h-2 rounded-full ${s.status === 'paid' ? 'bg-green-500' : 'bg-red-500'}"></span>
                                <h3 class="text-lg font-black uppercase italic">${s.name}</h3>
                                <span class="text-[9px] font-black px-2 py-0.5 rounded border border-white/10">${group} • ${age} yrs</span>
                                ${s.makeups > 0 ? `<span class="bg-blue-600 text-white text-[8px] font-black px-2 py-0.5 rounded">MAKEUPS: ${s.makeups}</span>` : ''}
                            </div>
                            <div class="text-[10px] text-gray-500 font-bold mt-1 uppercase">
                                Parent: ${s.pName} | ${s.pEmail} | <button onclick="window.open('https://wa.me/${s.phone}')" class="text-green-500">${s.phone}</button>
                            </div>
                            <div class="text-[9px] text-yellow-500/80 mt-1 uppercase font-black">
                                Schedule: ${s.schedule} ${s.invitationSent ? '• <span class="text-white">INVITATION SENT</span>' : ''}
                            </div>
                        </div>

                        <div class="flex flex-wrap gap-2">
                            ${!s.invitationSent ? `<button onclick="sendInvite('${s.id}')" class="px-3 py-2 bg-yellow-500 text-black text-[9px] font-black rounded uppercase">Send Invite</button>` : ''}
                            ${needsFollowUp ? `<button onclick="sendFollowUp('${s.id}')" class="px-3 py-2 bg-orange-500 text-white text-[9px] font-black rounded uppercase pulse">Follow Up</button>` : ''}
                            
                            <button onclick="toggleStatus('${s.id}', 'status', 'joining')" class="px-3 py-2 bg-green-600 text-white text-[9px] font-black rounded uppercase">Joining</button>
                            <button onclick="toggleStatus('${s.id}', 'status', 'notJoining')" class="px-3 py-2 bg-red-600 text-white text-[9px] font-black rounded uppercase">Not Joining</button>
                            <button onclick="openScheduleRequest('${s.id}')" class="px-3 py-2 bg-blue-600 text-white text-[9px] font-black rounded uppercase">Sched Req</button>
                            <button onclick="toggleStatus('${s.id}', 'status', 'paid')" class="px-3 py-2 bg-green-500 text-black text-[9px] font-black rounded uppercase">Paid</button>
                            <button onclick="toggleStatus('${s.id}', 'isdbDone', true)" class="px-3 py-2 bg-yellow-600 text-white text-[9px] font-black rounded uppercase">ISDB Done</button>
                            ${isBday ? `<button onclick="sendBdayWish('${s.id}')" class="px-3 py-2 bg-pink-500 text-white text-[9px] font-black rounded uppercase">🎂 Bday Wish</button>` : ''}
                        </div>
                    </div>
                `;
            }).join('');

            updateStats();
            renderBdayWidget();
        }

        function updateStats() {
            const stats = {
                total: students.length,
                joining: students.filter(s => s.status === 'joining' || s.status === 'paid').length,
                waiting: students.filter(s => s.invitationSent && !s.status).length,
                notJoining: students.filter(s => s.status === 'notJoining').length,
                paid: students.filter(s => s.status === 'paid').length,
                unpaid: students.filter(s => s.status === 'joining').length,
                rev: 0,
                isdb: students.filter(s => s.isdbDone).length
            };
            
            // Calculate revenue (Mock logic based on groups)
            students.filter(s => s.status === 'paid').forEach(s => {
                const group = getGroup(calculateAge(s.dob));
                stats.rev += (group === 'U8' ? 1390 : 1695);
            });

            const grid = document.getElementById('statsGrid');
            const data = [
                { label: 'Registered', val: stats.total },
                { label: 'Joining T3', val: stats.joining, color: 'text-green-400' },
                { label: 'Waiting', val: stats.waiting, color: 'text-yellow-400' },
                { label: 'Not Joining', val: stats.notJoining, color: 'text-red-400' },
                { label: 'Paid Total', val: stats.paid, color: 'text-green-500' },
                { label: 'Unpaid', val: stats.unpaid, color: 'text-red-500' },
                { label: 'Revenue AED', val: stats.rev.toLocaleString(), color: 'text-yellow-500' },
                { label: 'ISDB Done', val: stats.isdb, color: 'text-amber-500' }
            ];

            grid.innerHTML = data.map(d => `
                <div class="stat-card">
                    <p class="text-[8px] font-black text-gray-500 uppercase">${d.label}</p>
                    <h4 class="text-xl font-black ${d.color || ''}">${d.val}</h4>
                </div>
            `).join('');
        }

        function renderBdayWidget() {
            const widget = document.getElementById('bdayWidget');
            const upcoming = students.filter(s => isBirthdaySoon(s.dob));
            if (upcoming.length === 0) {
                widget.innerHTML = `<p class="text-[10px] text-gray-600">No birthdays this month.</p>`;
                return;
            }
            widget.innerHTML = upcoming.map(s => `
                <div class="flex justify-between items-center bg-black/40 p-3 rounded-xl border border-white/5">
                    <div>
                        <p class="text-xs font-black uppercase">${s.name}</p>
