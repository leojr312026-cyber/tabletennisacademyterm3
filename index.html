<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISD TABLE TENNIS TERM TRACKER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        body { background: #080808; color: #e5e7eb; font-family: 'Inter', sans-serif; letter-spacing: -0.02em; }
        .isd-glass { background: rgba(17, 17, 17, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
        .status-invited { border: 2px solid #eab308; background: rgba(234, 179, 8, 0.05); }
        .status-joining { border: 2px solid #4ade80; background: rgba(34, 197, 94, 0.05); }
        .status-paid { border: 2px solid #22c55e; background: #15803d; color: white; }
        .stat-card { background: #111; border-radius: 20px; padding: 1.25rem; border: 1px solid #222; }
        .day-btn.active { background: #eab308; color: black; }
        input, select { background: #1a1a1a !important; border: 1px solid #333 !important; color: white !important; border-radius: 12px; }
    </style>
</head>
<body class="p-4 lg:p-8">

    <div class="max-w-[1600px] mx-auto">
        <div class="flex flex-col xl:flex-row justify-between items-start xl:items-center mb-8 gap-4">
            <div>
                <h1 class="text-5xl font-black italic text-yellow-500 uppercase leading-none tracking-tighter">ISD TABLE TENNIS TERM TRACKER</h1>
                <p class="text-[9px] font-bold text-gray-500 uppercase mt-3 tracking-[0.2em]">created by Leo for ISD Racket Sports</p>
            </div>
            <div class="flex flex-wrap gap-2">
                <button onclick="downloadReport()" class="bg-blue-600 text-white px-5 py-2.5 rounded-xl text-[10px] font-black uppercase">Weekly Report</button>
                <button onclick="toggleWidget('bdayWidget')" class="bg-pink-600/20 text-pink-500 border border-pink-500/30 px-5 py-2.5 rounded-xl text-[10px] font-black uppercase">Birthdays</button>
            </div>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-4 xl:grid-cols-7 gap-3 mb-8">
            <div class="stat-card"><p class="text-[8px] font-black text-gray-500 uppercase mb-1">Total Revenue</p><h3 id="stat-rev" class="text-lg font-black text-green-500">0 AED</h3></div>
            <div class="stat-card"><p class="text-[8px] font-black text-gray-500 uppercase mb-1">Cash/Card/Link</p><h3 id="stat-split" class="text-[10px] font-bold">0 / 0 / 0</h3></div>
            <div class="stat-card"><p class="text-[8px] font-black text-gray-500 uppercase mb-1">ISDB Done</p><h3 id="stat-isdb" class="text-lg font-black text-blue-400">0</h3></div>
            <div class="stat-card"><p class="text-[8px] font-black text-gray-500 uppercase mb-1">Registered (T3)</p><h3 id="stat-reg" class="text-lg font-black text-yellow-500">0</h3></div>
            <div class="stat-card"><p class="text-[8px] font-black text-gray-500 uppercase mb-1">Not Joining</p><h3 id="stat-exit" class="text-lg font-black text-red-500">0</h3></div>
            <div class="stat-card"><p class="text-[8px] font-black text-gray-500 uppercase mb-1">Age Moves</p><h3 id="stat-age" class="text-lg font-black text-orange-500">0</h3></div>
            <div class="stat-card bg-yellow-500/5"><p class="text-[8px] font-black text-yellow-500 uppercase mb-1">Slots Taken</p><h3 id="stat-slots" class="text-lg font-black text-yellow-500">0/150</h3></div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-4">
                <div class="isd-glass p-6 rounded-[32px] sticky top-6">
                    <h3 class="text-[10px] font-black uppercase mb-6 text-gray-500 tracking-widest text-center">Operation Control</h3>
                    <form id="mainForm" onsubmit="handleRegistration(event)" class="space-y-3">
                        <input type="hidden" id="editId">
                        <input type="text" id="kName" placeholder="Student Name" required class="w-full p-4 text-sm">
                        <div class="grid grid-cols-2 gap-2">
                            <select id="ageGrp" class="p-4 text-xs font-bold uppercase" onchange="autoCalc()"><option value="U8">U8</option><option value="U12" selected>U12</option><option value="U16">U16</option></select>
                            <input type="date" id="dob" class="p-4 text-xs">
                        </div>
                        <input type="text" id="pName" placeholder="Parent Name" class="w-full p-4 text-sm">
                        <input type="tel" id="pPhone" placeholder="WhatsApp Number" class="w-full p-4 text-sm">
                        <div class="bg-black/50 p-4 rounded-2xl border border-white/5">
                            <div class="flex gap-1 mb-3" id="daySelector">
                                <button type="button" onclick="toggleDay(this,'Mon')" class="day-btn flex-1 py-2 rounded-lg border border-neutral-800 text-[10px] font-black">M</button>
                                <button type="button" onclick="toggleDay(this,'Tue')" class="day-btn flex-1 py-2 rounded-lg border border-neutral-800 text-[10px] font-black">T</button>
                                <button type="button" onclick="toggleDay(this,'Wed')" class="day-btn flex-1 py-2 rounded-lg border border-neutral-800 text-[10px] font-black">W</button>
                                <button type="button" onclick="toggleDay(this,'Thu')" class="day-btn flex-1 py-2 rounded-lg border border-neutral-800 text-[10px] font-black">T</button>
                                <button type="button" onclick="toggleDay(this,'Fri')" class="day-btn flex-1 py-2 rounded-lg border border-neutral-800 text-[10px] font-black">F</button>
                            </div>
                            <select id="timeSlots" class="w-full p-4 text-[10px] font-bold uppercase" multiple size="4">
                                <option value="3:00 PM - 4:00 PM">3:00 PM - 4:00 PM</option><option value="4:00 PM - 5:00 PM">4:00 PM - 5:00 PM</option><option value="5:00 PM - 6:00 PM">5:00 PM - 6:00 PM</option><option value="6:00 PM - 7:00 PM">6:00 PM - 7:00 PM</option>
                            </select>
                        </div>
                        <div class="flex justify-between items-center p-4 bg-black rounded-2xl">
                            <span class="text-[10px] font-black text-gray-500 uppercase">Fee</span>
                            <h2 id="feeDisplay" class="text-xl font-black text-yellow-500">0 AED</h2>
                        </div>
                        <button type="submit" class="w-full bg-yellow-500 text-black font-black py-4 rounded-2xl uppercase text-xs">Update Profile</button>
                    </form>
                </div>
            </div>

            <div class="lg:col-span-8">
                <div class="flex gap-3 mb-6">
                    <input type="text" id="search" onkeyup="render()" placeholder="Search active kids..." class="flex-1 bg-neutral-900 border-none rounded-2xl px-6 py-4 text-sm outline-none">
                    <button onclick="setView('active')" id="btn-active" class="px-6 py-4 rounded-2xl text-[10px] font-black uppercase bg-yellow-500 text-black">Active</button>
                    <button onclick="setView('vault')" id="btn-vault" class="px-6 py-4 rounded-2xl text-[10px] font-black uppercase bg-neutral-900 text-gray-500">Vault</button>
                </div>
                <div id="roster" class="space-y-3"></div>
            </div>
        </div>
    </div>

    <div id="bdayWidget" class="fixed inset-0 bg-black/95 hidden z-50 p-6 flex items-center justify-center">
        <div class="isd-glass p-8 rounded-[32px] w-full max-w-md">
            <h2 class="text-2xl font-black text-pink-500 uppercase mb-6 italic">Monthly Birthdays</h2>
            <div id="bdayList" class="space-y-2"></div>
            <button onclick="toggleWidget('bdayWidget')" class="mt-6 text-gray-500 uppercase text-[10px] font-bold">Close</button>
        </div>
    </div>

            { name: "Tehzeeb Ali", age: 16, dob: "2010-05-22", pName: "Gows Basha", phone: "+971552025369", schedule: "Wed 5pm & Fri 4pm" },
            { name: "Flora Bae", age: 11, dob: "2014-10-16", pName: "Sojin Park", phone: "971585980512", schedule: "Wed 5pm" },
            { name: "Humayd Gani", age: 10, dob: "2015-02-26", pName: "Mischka Tayob", phone: "505042823", schedule: "Wednesday 4pm" },
            { name: "Uthman Gani", age: 9, dob: "2016-04-20", pName: "Mischka Tayob", phone: "505042823", schedule: "Wednesday 4pm" },
            { name: "Aurele", age: 10, dob: "2015-09-06", pName: "Cedric Barraud", phone: "+41764255292", schedule: "Wed & Fri 4pm" },
            { name: "Michele Ferriani", age: 11, dob: "2014-04-05", pName: "Alina Makakaeva", phone: "971506068869", schedule: "Friday 4pm" },
            { name: "Parker Selt", age: 7, dob: "2018-06-19", pName: "Jessica Selt", phone: "971507735635", schedule: "Monday 4pm" },
            { name: "Aydan Tejani", age: 11, dob: "2014-11-26", pName: "Zhara Tejani", phone: "447557118196", schedule: "Thursday 5pm" }
        ];

        const RATES = { 'U8': [0, 1390, 2645, 3962], 'U12': [0, 1695, 3220, 4830], 'U16': [0, 1695, 3220, 4830] };
        let students = JSON.parse(localStorage.getItem('isd_final_tracker')) || MASTER_DATA.map((s,i) => ({ ...s, id: i+1, status: 'pending', days: [], slots: [], isPaid: false, isdb: false }));
        let archived = JSON.parse(localStorage.getItem('isd_final_archived')) || [];
        let selectedDays = []; let currentView = 'active';

        const save = () => { localStorage.setItem('isd_final_tracker', JSON.stringify(students)); localStorage.setItem('isd_final_archived', JSON.stringify(archived)); };

        function toggleDay(btn, d) {
            if(selectedDays.includes(d)) { selectedDays = selectedDays.filter(x => x !== d); btn.classList.remove('active'); }
            else { selectedDays.push(d); btn.classList.add('active'); }
            autoCalc();
        }

        function autoCalc() {
            const grp = document.getElementById('ageGrp').value;
            const price = RATES[grp][selectedDays.length] || 0;
            document.getElementById('feeDisplay').innerText = `${price.toLocaleString()} AED`;
            return price;
        }

        function handleRegistration(e) {
            e.preventDefault();
            const id = document.getElementById('editId').value;
            const data = {
                id: id || Date.now(),
                name: document.getElementById('kName').value,
                pName: document.getElementById('pName').value,
                phone: document.getElementById('pPhone').value,
                ageGrp: document.getElementById('ageGrp').value,
                dob: document.getElementById('dob').value,
                days: [...selectedDays],
                slots: Array.from(document.getElementById('timeSlots').selectedOptions).map(o => o.value),
                fee: autoCalc()
            };
            const idx = students.findIndex(x => x.id == id);
            if(idx !== -1) students[idx] = { ...students[idx], ...data };
            else students.push({ ...data, status: 'pending', isPaid: false });
            save(); resetForm(); render();
        }

        function setStatus(id, st) { const s = students.find(x => x.id == id); s.status = st; if(st==='paid') s.isPaid = true; save(); render(); }
        function setISDB(id) { const s = students.find(x => x.id == id); s.isdb = true; s.isPaid = true; s.status = 'paid'; save(); render(); }
        function setArchive(id) { const idx = students.findIndex(x => x.id == id); archived.push(students.splice(idx,1)[0]); save(); render(); }
        function setView(v) { currentView = v; render(); }

        function sendInvite(id, follow = false) {
            const s = students.find(x => x.id == id);
            const msg = follow ? `Following up for *${s.name}*'s Term 3 spot at ISD. - Leo` : `Confirming Term 3 for *${s.name}*. Booked: ${s.schedule}. Confirm?`;
            window.open(`https://wa.me/${s.phone}?text=${encodeURIComponent(msg)}`);
            if(!follow) { s.status = 'invited'; save(); render(); }
        }

        function render() {
            const container = document.getElementById('roster');
            const search = document.getElementById('search').value.toLowerCase();
            container.innerHTML = '';
            let rev=0, isdb=0, reg=0, slots=0;
            const list = currentView === 'active' ? students : archived;

            list.forEach(s => {
                if(!s.name.toLowerCase().includes(search)) return;
                if(s.isPaid) rev += s.fee || 0;
                if(s.isdb) isdb++;
                if(s.status === 'joining' || s.isPaid) reg++;
                slots += s.days.length;

                let cls = 'isd-card';
                if(s.status === 'invited') cls = 'status-invited';
                if(s.status === 'joining') cls = 'status-joining';
                if(s.isPaid || s.isdb) cls = 'status-paid';

                container.innerHTML += `
                    <div class="stat-card ${cls} flex flex-col md:flex-row justify-between items-center gap-4">
                        <div class="flex-1 w-full"><h4 class="text-lg font-black uppercase italic">${s.name} ${s.isdb?'✅':''}</h4><p class="text-[8px] font-bold text-gray-500 uppercase">${s.schedule} • ${s.pName}</p></div>
                        <div class="flex flex-wrap gap-1">
                            <button onclick="sendInvite(${s.id})" class="bg-yellow-500 text-black p-2 rounded-lg text-[8px] font-black uppercase">Invite</button>
                            <button onclick="setStatus(${s.id}, 'joining')" class="bg-green-500/20 text-green-400 p-2 rounded-lg text-[8px] font-black uppercase">Joining</button>
                            <button onclick="setArchive(${s.id})" class="bg-red-900/20 text-red-500 p-2 rounded-lg text-[8px] font-black uppercase">Exit</button>
                            <button onclick="setStatus(${s.id}, 'paid')" class="bg-green-600 p-2 rounded-lg text-[8px] font-black uppercase">Paid</button>
                            <button onclick="setISDB(${s.id})" class="bg-blue-600 p-2 rounded-lg text-[8px] font-black uppercase">ISDB</button>
                        </div>
                    </div>`;
            });
            document.getElementById('stat-rev').innerText = rev.toLocaleString() + ' AED';
            document.getElementById('stat-isdb').innerText = isdb;
            document.getElementById('stat-reg').innerText = reg;
            document.getElementById('stat-exit').innerText = archived.length;
            document.getElementById('stat-slots').innerText = `${slots}/150`;
        }

        function toggleWidget(id) { document.getElementById(id).classList.toggle('hidden'); }
        function resetForm() { document.getElementById('mainForm').reset(); selectedDays = []; document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active')); }
        render();
    </script>
</body>
</html>
