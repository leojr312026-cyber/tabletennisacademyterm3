<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISD TERMINAL V13 | FULL MASTER DATA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        :root { --isd-yellow: #eab308; --isd-pink: #f472b6; --isd-blue: #3b82f6; }
        body { background: #000; color: #eee; font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
        
        /* Neon Age-Group Frames */
        .frame-u8 { border: 4px solid var(--isd-pink); box-shadow: 0 0 15px rgba(244, 114, 182, 0.3); }
        .frame-u12 { border: 4px solid var(--isd-yellow); box-shadow: 0 0 15px rgba(234, 179, 8, 0.3); }
        .frame-u16 { border: 4px solid var(--isd-blue); box-shadow: 0 0 15px rgba(59, 130, 246, 0.3); }
        .frame-paid { border: 4px solid #16a34a !important; box-shadow: 0 0 20px #16a34a !important; }

        /* Birthday Pulse Feature */
        .bday-glow { animation: bday-pulse 1.5s infinite; border-style: dashed !important; }
        @keyframes bday-pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.7; transform: scale(1.01); } }

        .stat-card { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 16px; padding: 1rem; }
        .isd-input { background: #111; border: 1px solid #222; border-radius: 12px; padding: 12px; color: white; outline: none; }
        .isd-input:focus { border-color: var(--isd-yellow); }
        
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); }
        .hidden { display: none !important; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="loginOverlay" class="fixed inset-0 z-[100] bg-black flex items-center justify-center p-6">
        <div class="max-w-md w-full text-center">
            <h1 class="text-6xl font-black text-yellow-500 italic mb-2 uppercase tracking-tighter">ISD SYSTEM</h1>
            <p class="text-[10px] text-gray-600 font-bold tracking-[0.5em] mb-12 uppercase">Authorized Access Only</p>
            <input type="password" id="passcode" placeholder="ENTER STAFF NAME" class="w-full p-6 bg-neutral-900 border border-neutral-800 rounded-2xl text-center font-black text-white outline-none focus:border-yellow-500 text-2xl uppercase">
            <button onclick="checkAuth()" class="w-full mt-6 bg-yellow-500 text-black font-black py-5 rounded-2xl uppercase italic text-lg">Unlock Terminal</button>
        </div>
    </div>

    <div id="mainUI" class="max-w-[1750px] mx-auto hidden">
        <header class="flex flex-col lg:flex-row justify-between items-start lg:items-center mb-10 gap-6">
            <div>
                <h1 class="text-5xl lg:text-7xl font-black text-yellow-500 italic uppercase leading-none tracking-tighter">TERM 3 DATA</h1>
                <p id="roleLabel" class="text-[10px] font-bold text-gray-500 mt-4 tracking-[0.4em] uppercase"></p>
            </div>
            <div class="flex gap-3">
                <button onclick="setView('roster')" class="px-6 py-3 bg-neutral-900 border border-neutral-800 rounded-xl font-black text-[10px] uppercase">Roster</button>
                <button onclick="setView('attendance')" class="px-6 py-3 bg-neutral-900 border border-neutral-800 rounded-xl font-black text-[10px] uppercase">Attendance</button>
                <button id="addBtn" onclick="openReg()" class="px-6 py-3 bg-yellow-500 text-black rounded-xl font-black text-[10px] uppercase hidden">+ Add Student</button>
            </div>
        </header>

        <div id="statsMatrix" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 xl:grid-cols-11 gap-2 mb-10"></div>
        
        <div id="viewContainer"></div>
    </div>

    <div id="regModal" class="fixed inset-0 bg-black/98 z-[120] hidden flex items-center justify-center p-4">
        <div id="modalFrame" class="bg-neutral-900 p-8 rounded-[40px] w-full max-w-4xl border-4 border-neutral-800">
            <h2 class="text-3xl font-black text-yellow-500 mb-6 uppercase italic">Student Profile & Data</h2>
            <form onsubmit="saveNewKid(event)" class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="flex flex-col"><label class="text-[9px] font-bold text-gray-500 mb-1">KID NAME</label><input type="text" id="nkName" required class="isd-input"></div>
                <div class="flex flex-col"><label class="text-[9px] font-bold text-gray-500 mb-1">KID BIRTHDAY</label><input type="date" id="nkDob" onchange="updateModalLogic()" required class="isd-input"></div>
                <div class="flex flex-col"><label class="text-[9px] font-bold text-gray-500 mb-1">PARENT NAME</label><input type="text" id="npName" required class="isd-input"></div>
                <div class="flex flex-col"><label class="text-[9px] font-bold text-gray-500 mb-1">PARENT PHONE</label><input type="tel" id="npPhone" required class="isd-input"></div>
                <div class="flex flex-col"><label class="text-[9px] font-bold text-gray-500 mb-1">PARENT EMAIL</label><input type="email" id="npEmail" required class="isd-input"></div>
                <div class="flex flex-col"><label class="text-[9px] font-bold text-gray-500 mb-1">START DATE</label><input type="date" id="startDate" value="2026-03-30" onchange="updateModalLogic()" class="isd-input"></div>
                
                <div class="col-span-full p-4 bg-black rounded-2xl flex justify-between items-center border border-yellow-500/20">
                    <div>
                        <p id="groupStatus" class="text-[10px] font-black text-gray-400 uppercase tracking-widest">GROUP: PENDING</p>
                        <p id="ageStatus" class="text-xs font-bold text-white uppercase"></p>
                    </div>
                    <span id="liveFee" class="text-4xl font-black text-yellow-500 italic">0 AED</span>
                </div>
                
                <button type="submit" class="col-span-2 bg-yellow-500 text-black font-black py-5 rounded-2xl uppercase italic shadow-xl">Complete Registration</button>
                <button type="button" onclick="closeReg()" class="bg-neutral-800 text-white font-black py-5 rounded-2xl uppercase italic">Cancel</button>
            </form>
        </div>
    </div>

    <script>
        const ROLES = { 'LEO': 'ADMIN', 'DIEGO': 'ADMIN', 'VANESSA': 'ADMIN', 'JOY': 'ADMIN', 'CHRISTINE': 'ADMIN', 'TIMA': 'ADMIN', 'RAFA': 'ADMIN', 'ALXEY': 'COACH', 'YULIA': 'COACH', 'SARAH': 'COACH' };
        
        let students = JSON.parse(localStorage.getItem('isd_master_v13')) || [];
        let currentView = 'roster';
        let userRole = null;

        // INITIALIZE 53 STUDENTS WITH DUMMY DATA FOR MISSING FIELDS
        if (students.length === 0) {
            const names = ["Musa Junego", "Samuel Greiner", "Ishaan Kumar", "Artem Arzhanov", "Yuri Kurdyukov", "Gherman Mustiviy", "Ryan Kim", "Elai Fatykhov", "Arjun Arun", "Mark Krutko", "Daniel Fady", "Haider Hasan", "Mark Dorogya", "Jayden Chan", "Petr", "Daniil Gasparin", "Louis Verrotte", "Cameron Miller", "Borong Song", "Shivam Vallabh", "Veronika Ivanuis", "Atuka Mandzhiev", "Hani Omari", "Zaid Omari", "Judy El Masri", "Charlie Pinchbeck", "Julia Abdelmalek", "Ziad Biyouk", "Zahra Adnan", "Abdul Hadi Adnan", "Vihan Asarpota", "Marc Galice", "Cagan Soylemez", "Alqaisar Wanous", "Ishana", "Vihaan Gupta", "Aryan Bansal", "Anna Mazkun", "Anwita Shastri", "Theo Copper", "Leo Girichev", "Gian Hotchandani", "Khloie Siniakina", "Metodi", "Jaden", "Tehzeeb Ali", "Flora Bae", "Humayd Gani", "Uthman Gani", "Aurele", "Michele Ferriani", "Parker Selt", "Aydan Tejani"];
            students = names.map((n, i) => ({
                id: Date.now() + i,
                name: n,
                dob: "2016-01-01", // Default DOB
                pName: "Parent Name",
                phone: "97150000000",
                email: "parent@isdacademy.com",
                status: 'pending',
                isdb: false,
                startDate: '2026-03-30',
                endDate: '2026-07-03',
                makeups: 0,
                attendance: {}
            }));
            save();
        }

        function getAge(dob) {
            const diff = Date.now() - new Date(dob).getTime();
            return Math.floor(diff / (1000 * 60 * 60 * 24 * 365.25));
        }

        function calculateGroup(dob) {
            const age = getAge(dob);
            if (age < 8) return { label: 'U8', fee: 1390, color: 'u8' };
            if (age < 12) return { label: 'U12', fee: 1695, color: 'u12' };
            return { label: 'U16', fee: 1695, color: 'u16' };
        }

        function calculateProRatedFee(dob, start) {
            const grp = calculateGroup(dob);
            const termEnd = new Date('2026-07-03');
            const termStart = new Date(start);
            const weeks = Math.ceil(Math.abs(termEnd - termStart) / (1000 * 60 * 60 * 24 * 7));
            return Math.round((grp.fee / 14) * Math.min(weeks, 14));
        }

        function checkAuth() {
            const val = document.getElementById('passcode').value.toUpperCase();
            if (ROLES[val]) {
                userRole = ROLES[val];
                document.getElementById('loginOverlay').classList.add('hidden');
                document.getElementById('mainUI').classList.remove('hidden');
                document.getElementById('roleLabel').innerText = `ACCESS: ${val} | ROLE: ${userRole}`;
                if (userRole === 'ADMIN') document.getElementById('addBtn').classList.remove('hidden');
                render();
            }
        }

        function setView(v) { currentView = v; render(); }

        function render() {
            const container = document.getElementById('viewContainer');
            container.innerHTML = '';
            updateStats();

            if (currentView === 'roster') {
                let html = `<div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">`;
                students.sort((a,b) => (b.status === 'paid' ? 1 : -1)).forEach(s => {
                    const grp = calculateGroup(s.dob);
                    const fee = calculateProRatedFee(s.dob, s.startDate);
                    const isBdayMonth = new Date(s.dob).getMonth() === new Date().getMonth();
                    const isPaid = s.status === 'paid';
                    
                    html += `
                        <div class="stat-card frame-${grp.color} ${isPaid?'frame-paid':''} ${isBdayMonth?'bday-glow':''}">
                            <div class="flex justify-between items-start mb-4">
                                <div>
                                    <h3 class="text-xl font-black italic uppercase">${s.name}</h3>
                                    <p class="text-[8px] font-black text-gray-500 uppercase mt-1">PARENTS: ${s.pName} | ${s.email}</p>
                                </div>
                                <div class="text-right">
                                    <p class="text-xl font-black text-yellow-500">${fee} AED</p>
                                    <p class="text-[8px] font-black ${isPaid?'text-green-500':'text-red-500'}">${isPaid?'PAID':'UNPAID'}</p>
                                </div>
                            </div>
                            <div class="grid grid-cols-2 gap-2 mb-4">
                                <div class="bg-black/50 p-2 rounded-lg text-[8px]"><p class="text-gray-500">GROUP</p><p class="font-black text-white">${grp.label}</p></div>
                                <div class="bg-black/50 p-2 rounded-lg text-[8px]"><p class="text-gray-500">MAKEUPS</p><p class="font-black text-blue-400">${s.makeups}</p></div>
                            </div>
                            <div class="flex gap-2">
                                <button onclick="window.open('https://wa.me/${s.phone}')" class="flex-1 bg-neutral-800 p-3 rounded-xl text-[9px] font-black uppercase">Contact</button>
                                <button onclick="togglePaid(${s.id})" class="flex-1 p-3 rounded-xl text-[9px] font-black uppercase ${isPaid?'bg-green-600':'bg-neutral-800'}">${isPaid?'Refund':'Mark Paid'}</button>
                            </div>
                        </div>`;
                });
                container.innerHTML = html + `</div>`;
            } else {
                renderAttendance(container);
            }
        }

        function renderAttendance(container) {
            const today = new Date().toISOString().split('T')[0];
            let html = `<div class="bg-neutral-900 rounded-[30px] p-6 overflow-x-auto"><table class="w-full text-left">
                <thead class="text-[9px] text-gray-500 uppercase border-b border-white/5"><tr><th class="pb-4">Student</th><th class="pb-4">Group</th><th class="pb-4">Action</th><th class="pb-4 text-center">Makeups</th></tr></thead><tbody>`;
            students.forEach(s => {
                const grp = calculateGroup(s.dob);
                const att = (s.attendance && s.attendance[today]) || null;
                html += `<tr class="border-b border-white/5">
                    <td class="py-4 font-black uppercase italic text-sm">${s.name}</td>
                    <td class="py-4"><span class="text-[9px] font-black px-2 py-1 rounded bg-neutral-800">${grp.label}</span></td>
                    <td class="py-4 flex gap-1">
                        <button onclick="markAtt(${s.id}, 'present')" class="px-3 py-1 rounded text-[8px] font-black ${att==='present'?'bg-green-600':'bg-neutral-800'}">P</button>
                        <button onclick="markAtt(${s.id}, 'absent')" class="px-3 py-1 rounded text-[8px] font-black ${att==='absent'?'bg-red-600':'bg-neutral-800'}">A</button>
                        <button onclick="markAtt(${s.id}, 'medical')" class="px-3 py-1 rounded text-[8px] font-black ${att==='medical'?'bg-blue-600':'bg-neutral-800'}">MED</button>
                    </td>
                    <td class="py-4 font-black text-blue-400 text-center">${s.makeups}</td>
                </tr>`;
            });
            container.innerHTML = html + `</tbody></table></div>`;
        }

        function markAtt(id, status) {
            const s = students.find(x => x.id === id);
            const today = new Date().toISOString().split('T')[0];
            if (!s.attendance) s.attendance = {};
            if (s.attendance[today] === 'medical' && status !== 'medical') s.makeups = Math.max(0, s.makeups - 1);
            if (status === 'medical' && s.attendance[today] !== 'medical') s.makeups++;
            s.attendance[today] = status;
            save();
        }

        function updateStats() {
            const stats = { rev: 0, count: students.length, paid: 0, med: 0, u8: 0, u12: 0, u16: 0 };
            students.forEach(s => {
                const grp = calculateGroup(s.dob);
                if (s.status === 'paid') { stats.rev += calculateProRatedFee(s.dob, s.startDate); stats.paid++; }
                stats.med += s.makeups;
                if (grp.label === 'U8') stats.u8++; else if (grp.label === 'U12') stats.u12++; else stats.u16++;
            });
            const matrix = document.getElementById('statsMatrix');
            matrix.innerHTML = '';
            const labs = [["Revenue", stats.rev, "text-green-500"], ["Kids", stats.count, ""], ["Paid", stats.paid, "text-yellow-500"], ["Med Owed", stats.med, "text-blue-400"], ["U8", stats.u8, "text-pink-400"], ["U12", stats.u12, "text-yellow-400"], ["U16", stats.u16, "text-blue-400"]];
            labs.forEach(l => { matrix.innerHTML += `<div class="stat-card text-center"><p class="text-[7px] font-black text-gray-600 uppercase mb-1">${l[0]}</p><h4 class="text-sm font-black ${l[2]}">${l[1]}</h4></div>`; });
        }

        function togglePaid(id) { const s = students.find(x => x.id === id); s.status = s.status === 'paid' ? 'pending' : 'paid'; s.isdb = (s.status === 'paid'); save(); }
        function save() { localStorage.setItem('isd_master_v13', JSON.stringify(students)); render(); }
        function openReg() { document.getElementById('regModal').classList.remove('hidden'); }
        function closeReg() { document.getElementById('regModal').classList.add('hidden'); }
        
        function updateModalLogic() {
            const dob = document.getElementById('nkDob').value;
            const start = document.getElementById('startDate').value;
            if (dob) {
                const grp = calculateGroup(dob);
                const fee = calculateProRatedFee(dob, start);
                document.getElementById('modalFrame').className = `bg-neutral-900 p-8 rounded-[40px] w-full max-w-4xl border-4 frame-${grp.color}`;
                document.getElementById('groupStatus').innerText = `GROUP: ${grp.label}`;
                document.getElementById('ageStatus').innerText = `AGE: ${getAge(dob)} YEARS OLD`;
                document.getElementById('liveFee').innerText = fee + " AED";
            }
        }

        function saveNewKid(e) {
            e.preventDefault();
            students.push({
                id: Date.now(),
                name: document.getElementById('nkName').value,
                dob: document.getElementById('nkDob').value,
                pName: document.getElementById('npName').value,
                phone: document.getElementById('npPhone').value,
                email: document.getElementById('npEmail').value,
                startDate: document.getElementById('startDate').value,
                endDate: '2026-07-03',
                status: 'pending',
                isdb: false,
                makeups: 0,
                attendance: {}
            });
            save(); closeReg();
        }

        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('mode') === 'register') {
                document.getElementById('loginOverlay').classList.add('hidden');
                document.getElementById('mainUI').classList.add('hidden');
                openReg();
            }
        };
    </script>
</body>
</html>
