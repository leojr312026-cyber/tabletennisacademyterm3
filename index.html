<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISD TABLE TENNIS | TERM 3 TRACKER BY LEO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        :root { --isd-yellow: #FFD700; --isd-black: #0A0A0A; --isd-gray: #1A1A1A; }
        body { background-color: var(--isd-black); color: white; font-family: 'Inter', sans-serif; letter-spacing: -0.02em; }
        .isd-card { background: var(--isd-gray); border: 1px solid rgba(255,255,255,0.05); transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .isd-card:hover { border-color: var(--isd-yellow); transform: translateY(-2px); }
        .u8-tag { border-left: 5px solid #FF69B4; }
        .u12-tag { border-left: 5px solid var(--isd-yellow); }
        .u16-tag { border-left: 5px solid #555; }
        .checked-in { background: rgba(34, 197, 94, 0.1) !important; border-color: #22c55e !important; }
        .stat-label { font-size: 9px; font-weight: 900; color: #666; text-transform: uppercase; letter-spacing: 0.1em; }
        input, select { background: #111 !important; border: 1px solid #333 !important; color: white !important; }
        .age-pulse { animation: pulse 2s infinite; color: #fb923c; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <div class="flex flex-col lg:flex-row justify-between items-start lg:items-end mb-10 gap-6">
            <div>
                <h1 class="text-5xl font-black italic text-yellow-500 uppercase leading-none tracking-tighter">ISD TABLE TENNIS</h1>
                <p class="text-gray-500 text-xs font-bold uppercase mt-3 tracking-[0.4em]">Term 3 Tracker Created by Leo</p>
            </div>
            <div class="flex flex-wrap gap-3">
                <button onclick="exportCSV()" class="bg-neutral-800 px-5 py-3 rounded-2xl text-[10px] font-black uppercase border border-neutral-700 hover:bg-neutral-700"><i class="fas fa-download mr-2 text-green-500"></i>Export Roster</button>
                <button onclick="resetDaily()" class="bg-red-900/10 text-red-500 px-5 py-3 rounded-2xl text-[10px] font-black uppercase border border-red-900/20 hover:bg-red-900/20">Daily Reset</button>
            </div>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4 mb-12">
            <div class="isd-card p-6 rounded-3xl"><p class="stat-label">Total Revenue</p><h3 id="stat-total" class="text-2xl font-black text-white">0</h3></div>
            <div class="isd-card p-6 rounded-3xl"><p class="stat-label">Cash Flow</p><h3 id="stat-cash" class="text-2xl font-black text-green-400">0</h3></div>
            <div class="isd-card p-6 rounded-3xl"><p class="stat-label">Card/Online</p><h3 id="stat-card" class="text-2xl font-black text-blue-400">0</h3></div>
            <div class="isd-card p-6 rounded-3xl"><p class="stat-label">Confirmed (T3)</p><h3 id="stat-conf" class="text-2xl font-black text-yellow-500">0</h3></div>
            <div class="isd-card p-6 rounded-3xl"><p class="stat-label">Age Alerts</p><h3 id="stat-age" class="text-2xl font-black text-orange-500">0</h3></div>
            <div class="isd-card p-6 rounded-3xl bg-yellow-500/5 border-yellow-500/20"><p class="stat-label text-yellow-500">Daily Attendance</p><h3 id="stat-attn" class="text-2xl font-black text-yellow-500">0/0</h3></div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-10">
            <div class="lg:col-span-4">
                <div class="isd-card p-8 rounded-[40px] sticky top-8 shadow-2xl">
                    <h3 class="text-[10px] font-black uppercase mb-8 tracking-widest text-gray-400 border-b border-white/5 pb-4">Management Portal</h3>
                    <form onsubmit="handleRegistration(event)" class="space-y-4">
                        <input type="text" id="kName" placeholder="Student Name" required class="w-full p-4 rounded-2xl text-sm outline-none focus:border-yellow-500">
                        <div class="grid grid-cols-2 gap-3">
                            <select id="ageGrp" class="p-4 rounded-2xl text-sm font-bold uppercase" onchange="updatePrice()">
                                <option value="U8">U8 Group</option>
                                <option value="U12" selected>U12 Group</option>
                                <option value="U16">U16 Group</option>
                            </select>
                            <input type="date" id="dob" class="p-4 rounded-2xl text-xs" onchange="render()">
                        </div>
                        <input type="text" id="pName" placeholder="Parent Name" class="w-full p-4 rounded-2xl text-sm">
                        <input type="tel" id="pPhone" placeholder="Contact (05X...)" class="w-full p-4 rounded-2xl text-sm">
                        
                        <div class="flex justify-between gap-1 mt-2">
                            <button type="button" onclick="setDay(this,'Mon')" class="day-btn flex-1 py-3 rounded-xl border border-neutral-800 text-[10px] font-black transition">M</button>
                            <button type="button" onclick="setDay(this,'Tue')" class="day-btn flex-1 py-3 rounded-xl border border-neutral-800 text-[10px] font-black transition">T</button>
                            <button type="button" onclick="setDay(this,'Wed')" class="day-btn flex-1 py-3 rounded-xl border border-neutral-800 text-[10px] font-black transition">W</button>
                            <button type="button" onclick="setDay(this,'Thu')" class="day-btn flex-1 py-3 rounded-xl border border-neutral-800 text-[10px] font-black transition">T</button>
                            <button type="button" onclick="setDay(this,'Fri')" class="day-btn flex-1 py-3 rounded-xl border border-neutral-800 text-[10px] font-black transition">F</button>
                        </div>
                        
                        <div class="bg-black/50 p-6 rounded-3xl border border-white/5 text-center mt-6">
                            <p class="stat-label mb-1">Fee Calculation</p>
                            <h2 id="feeDisplay" class="text-3xl font-black text-yellow-500">0 AED</h2>
                        </div>
                        
                        <button type="submit" class="w-full bg-yellow-500 text-black font-black py-5 rounded-[20px] uppercase text-sm hover:bg-yellow-400 transition-all shadow-lg shadow-yellow-500/10">Register Profile</button>
                    </form>
                </div>
            </div>

            <div class="lg:col-span-8">
                <div class="flex flex-wrap gap-3 mb-8 items-center bg-neutral-900/50 p-2 rounded-[24px]">
                    <button onclick="setView('today')" id="v-today" class="view-btn px-6 py-3 rounded-2xl text-[10px] font-black uppercase transition-all">Today</button>
                    <button onclick="setView('all')" id="v-all" class="view-btn px-6 py-3 rounded-2xl text-[10px] font-black uppercase transition-all">All Students</button>
                    <button onclick="setView('invite')" id="v-invite" class="view-btn px-6 py-3 rounded-2xl text-[10px] font-black uppercase text-blue-400 transition-all">Needs Invite</button>
                    <input type="text" id="search" onkeyup="render()" placeholder="Search database..." class="flex-1 bg-transparent border-none rounded-2xl px-6 py-3 text-sm focus:ring-0">
                </div>
                
                <div id="roster" class="space-y-4">
                    </div>
            </div>
        </div>
    </div>

    <div id="payModal" class="fixed inset-0 bg-black/98 hidden flex items-center justify-center p-4 z-50 backdrop-blur-sm">
        <div class="isd-card p-10 rounded-[40px] w-full max-w-sm text-center border-yellow-500/20">
            <div class="w-16 h-16 bg-yellow-500 rounded-full flex items-center justify-center mx-auto mb-6">
                <i class="fas fa-wallet text-black text-2xl"></i>
            </div>
            <h2 id="pay-name" class="text-xl font-black text-white mb-2 uppercase"></h2>
            <p id="pay-amount" class="text-yellow-500 font-bold mb-8"></p>
            
            <select id="pay-method" class="w-full p-4 rounded-2xl mb-4 font-black uppercase">
                <option value="Cash">Cash Payment</option>
                <option value="Card">Card Machine</option>
                <option value="Link">Online Link</option>
            </select>
            
            <input type="text" id="pay-ref" placeholder="Reference / Receipt #" class="w-full p-4 rounded-2xl text-center mb-6 bg-black border border-neutral-800 font-mono text-sm">
            
            <div class="space-y-3">
                <button onclick="processPayment()" class="w-full bg-green-600 text-white font-black py-4 rounded-2xl uppercase text-sm shadow-lg shadow-green-600/20">Confirm Payment</button>
                <button onclick="closePay()" class="w-full text-gray-500 font-bold py-2 text-[10px] uppercase">Cancel Transaction</button>
            </div>
        </div>
    </div>

    <script>
        // Pricing Logic based on ISD Standards
        const RATES = { 
            'U8': [0, 1390, 2645, 3962], 
            'U12': [0, 1695, 3220, 4830], 
            'U16': [0, 1695, 3220, 4830] 
        };

        // Static Master Database (Initial 53 Kids)
        const MASTER_DB = [
            { id: 1, name: "Musa Junego", pName: "Reena Babar", phone: "0547773836", ageGrp: "U12", dob: "2015-05-15", days: ["Mon"], fee: 1695, invited: false, confirmed: false, checkIn: false, isPaid: false },
            { id: 2, name: "Samuel Greiner", pName: "Patrick / Miriam", phone: "0507588134", ageGrp: "U12", dob: "2012-03-10", days: ["Mon", "Fri"], fee: 3220, invited: false, confirmed: false, checkIn: false, isPaid: false },
            { id: 3, name: "Ishaan Kumar", pName: "Ashish Kumar", phone: "0522976720", ageGrp: "U8", dob: "2017-02-12", days: ["Tue", "Thu"], fee: 2645, invited: false, confirmed: false, checkIn: false, isPaid: false },
            { id: 4, name: "Artem Arzhanov", pName: "Natalia Arzanova", phone: "+79858021467", ageGrp: "U12", dob: "2013-11-20", days: ["Wed", "Fri"], fee: 3220, invited: false, confirmed: false, checkIn: false, isPaid: false },
            { id: 5, name: "Tehzeeb Ali", pName: "Gows Basha", phone: "0552025369", ageGrp: "U16", dob: "2009-08-05", days: ["Wed", "Fri"], fee: 3220, invited: false, confirmed: false, checkIn: false, isPaid: false }
            // Note: Use the sidebar form to add the rest of the 53 kids once live; they will be saved permanently in browser.
        ];

        let students = JSON.parse(localStorage.getItem('isd_t3_leo')) || MASTER_DB;
        let selectedDays = [];
        let viewMode = 'today';
        let activeKidId = null;

        const save = () => localStorage.setItem('isd_t3_leo', JSON.stringify(students));
        const getAge = (dob) => { if(!dob) return 0; const b = new Date(dob); const n = new Date(); let a = n.getFullYear()-b.getFullYear(); if(n.getMonth()<b.getMonth() || (n.getMonth()==b.getMonth() && n.getDate()<b.getDate())) a--; return a; };

        function setDay(btn, d) {
            if(selectedDays.includes(d)) {
                selectedDays = selectedDays.filter(x => x !== d);
                btn.classList.remove('bg-yellow-500', 'text-black');
            } else {
                if(selectedDays.length >= 3) return;
                selectedDays.push(d);
                btn.classList.add('bg-yellow-500', 'text-black');
            }
            updatePrice();
        }

        function updatePrice() {
            const grp = document.getElementById('ageGrp').value;
            const price = RATES[grp][selectedDays.length] || 0;
            document.getElementById('feeDisplay').innerText = `${price.toLocaleString()} AED`;
            return price;
        }

        function handleRegistration(e) {
            e.preventDefault();
            const newKid = {
                id: Date.now(),
                name: document.getElementById('kName').value,
                pName: document.getElementById('pName').value,
                phone: document.getElementById('pPhone').value,
                ageGrp: document.getElementById('ageGrp').value,
                dob: document.getElementById('dob').value,
                days: [...selectedDays],
                fee: updatePrice(),
                invited: false, confirmed: false, checkIn: false, isPaid: false, followUps: 0
            };
            students.push(newKid);
            save();
            e.target.reset();
            selectedDays = [];
            document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('bg-yellow-500', 'text-black'));
            render();
        }

        function render() {
            const container = document.getElementById('roster');
            const search = document.getElementById('search').value.toLowerCase();
            const today = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][new Date().getDay()];
            
            container.innerHTML = '';
            let cash=0, card=0, conf=0, alerts=0, present=0, expected=0;

            // Stats Update Logic
            students.forEach(s => {
                const age = getAge(s.dob);
                const needsMove = (s.ageGrp === 'U8' && age >= 9) || (s.ageGrp === 'U12' && age >= 13);
                const isBday = s.dob && new Date(s.dob).getMonth() === new Date().getMonth();

                if(s.confirmed) conf++;
                if(needsMove) alerts++;
                if(s.days.includes(today)) { expected++; if(s.checkIn) present++; }
                if(s.isPaid) { if(s.method === 'Cash') cash += s.fee; else card += s.fee; }

                // Filter Logic
                if(!s.name.toLowerCase().includes(search) && !s.phone.includes(search)) return;
                if(viewMode === 'today' && !s.days.includes(today)) return;
                if(viewMode === 'invite' && s.invited) return;

                container.innerHTML += `
                    <div class="isd-card p-6 rounded-[32px] flex flex-col md:flex-row justify-between items-center gap-6 ${s.checkIn ? 'checked-in' : ''} ${s.ageGrp==='U8'?'u8-tag':s.ageGrp==='U12'?'u12-tag':'u16-tag'}">
                        <div class="flex-1 w-full">
                            <div class="flex items-center gap-3 mb-2">
                                <h4 class="text-xl font-black uppercase italic">${isBday?'🎂 ':''}${s.name}</h4>
                                <span class="text-[8px] font-black px-3 py-1 rounded-full ${s.confirmed?'bg-yellow-500 text-black':'bg-neutral-800 text-gray-500'}">${s.confirmed?'CONFIRMED':'T3 PENDING'}</span>
                            </div>
                            
                            ${needsMove ? `<p class="text-[9px] font-black uppercase age-pulse mb-3"><i class="fas fa-exclamation-triangle mr-1"></i> Promotion Due (Age ${age})</p>` : ''}

                            <div class="grid grid-cols-2 lg:grid-cols-4 gap-6 text-[10px] font-bold text-gray-500 mb-6">
                                <div><p class="stat-label">Guardian</p><p class="text-white">${s.pName}</p></div>
                                <div><p class="stat-label">WhatsApp</p><a href="https://wa.me/${s.phone}" target="_blank" class="text-green-500">${s.phone}</a></div>
                                <div><p class="stat-label">Schedule</p><p class="text-white">${s.days.join(' & ')}</p></div>
                                <div><p class="stat-label">Financials</p><p class="${s.isPaid?'text-green-500':'text-yellow-500'} font-black italic">${s.isPaid?'PAID IN FULL':s.fee + ' AED DUE'}</p></div>
                            </div>

                            <div class="flex flex-wrap gap-2">
                                <button onclick="markAttendance(${s.id})" class="px-5 py-2.5 rounded-xl text-[9px] font-black border border-neutral-800 uppercase hover:bg-white hover:text-black transition">Check-In</button>
                                ${!s.invited ? 
                                    `<button onclick="sendInvite(${s.id}, true)" class="bg-green-600/10 text-green-500 px-5 py-2.5 rounded-xl text-[9px] font-black uppercase">Send T3 Invite</button>` : 
                                    `<button onclick="sendInvite(${s.id}, false)" class="bg-blue-600/10 text-blue-400 px-5 py-2.5 rounded-xl text-[9px] font-black uppercase">Nudge (${s.followUps||0})</button>`
                                }
                                <button onclick="toggleConfirm(${s.id})" class="px-5 py-2.5 rounded-xl text-[9px] font-black border border-neutral-800 uppercase ${s.confirmed?'text-yellow-500 border-yellow-500/30':''}">Confirm Spot</button>
                                ${!s.isPaid ? 
                                    `<button onclick="openPay(${s.id})" class="bg-yellow-500 text-black px-5 py-2.5 rounded-xl text-[9px] font-black uppercase hover:scale-105 transition">Process Pay</button>` : 
                                    `<span class="text-[9px] font-black text-gray-600 uppercase ml-3 self-center"><i class="fas fa-check mr-1"></i> ${s.method}</span>`
                                }
                                ${isBday ? `<button onclick="sendBday(${s.id})" class="bg-pink-600/10 text-pink-400 px-5 py-2.5 rounded-xl text-[9px] font-black uppercase">Wish Bday</button>` : ''}
                            </div>
                        </div>
                    </div>
                `;
            });

            // Update UI Counters
            document.getElementById('stat-total').innerText = (cash + card).toLocaleString() + " AED";
            document.getElementById('stat-cash').innerText = cash.toLocaleString();
            document.getElementById('stat-card').innerText = card.toLocaleString();
            document.getElementById('stat-conf').innerText = conf;
            document.getElementById('stat-age').innerText = alerts;
            document.getElementById('stat-attn').innerText = `${present}/${expected}`;

            // Sync View Buttons
            document.querySelectorAll('.view-btn').forEach(b => b.className = b.className.replace('bg-yellow-500 text-black', 'bg-neutral-900 text-gray-400'));
            document.getElementById('v-' + viewMode).classList.add('bg-yellow-500', 'text-black');
        }

        function markAttendance(id) { const s = students.find(x => x.id === id); s.checkIn = !s.checkIn; save(); render(); }
        function toggleConfirm(id) { const s = students.find(x => x.id === id); s.confirmed = !s.confirmed; save(); render(); }
        function setView(v) { viewMode = v; render(); }

        function sendInvite(id, isFirst) {
            const s = students.find(x => x.id === id);
            const msg = isFirst ? 
                `Hi ${s.pName}, greetings from *ISD TABLE TENNIS!* 🏓 We are organizing the roster for *Term 3* and would love to confirm *${s.name}* for their usual slot: *${s.days.join(' & ')}*. Shall we book it?` : 
                `Hi ${s.pName}, checking back regarding *${s.name}* for *Term 3* at ISD! Spots are filling up—let us know if you'd like to keep your slot! 🏓`;
            
            window.open(`https://wa.me/${s.phone}?text=${encodeURIComponent(msg)}`);
            s.invited = true;
            s.followUps = (s.followUps || 0) + 1;
            save(); render();
        }

        function sendBday(id) {
            const s = students.find(x => x.id === id);
            const msg = `Happy Birthday to *${s.name}* from all of us at *ISD TABLE TENNIS!* 🎂🏓 Hope you have a fantastic day!`;
            window.open(`https://wa.me/${s.phone}?text=${encodeURIComponent(msg)}`);
        }

        function openPay(id) {
            activeKidId = id;
            const s = students.find(x => x.id === id);
            document.getElementById('pay-name').innerText = s.name;
            document.getElementById('pay-amount').innerText = `Total Due: ${s.fee} AED`;
            document.getElementById('payModal').classList.remove('hidden');
        }

        function closePay() { document.getElementById('payModal').classList.add('hidden'); }

        function processPayment() {
            const s = students.find(x => x.id === activeKidId);
            s.isPaid = true;
            s.method = document.getElementById('pay-method').value;
            s.ref = document.getElementById('pay-ref').value;
            save(); closePay(); render();
        }

        function resetDaily() { if(confirm('Clear all attendance for today?')) { students.forEach(s => s.checkIn = false); save(); render(); } }

        function exportCSV() {
            let csv = "Student,Parent,Phone,Group,Fee,Status,Method,Ref\n";
            students.forEach(s => {
                csv += `"${s.name}","${s.pName}","${s.phone}","${s.ageGrp}",${s.fee},"${s.isPaid?'Paid':'Due'}","${s.method||''}","${s.ref||''}"\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `ISD_T3_ROSTER_${new Date().toISOString().split('T')[0]}.csv`;
            a.click();
        }

        // Initialize
        render();
    </script>
</body>
</html>
