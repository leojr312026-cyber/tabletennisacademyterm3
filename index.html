<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISD TABLE TENNIS TERM TRACKER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        :root { --isd-yellow: #eab308; --isd-pink: #f472b6; --isd-blue: #3b82f6; }
        body { background: #050505; color: #eee; font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
        .frame-u8 { border: 4px solid var(--isd-pink); box-shadow: 0 0 15px rgba(244, 114, 182, 0.2); }
        .frame-u12 { border: 4px solid var(--isd-yellow); box-shadow: 0 0 15px rgba(234, 179, 8, 0.2); }
        .frame-u16 { border: 4px solid var(--isd-blue); box-shadow: 0 0 15px rgba(59, 130, 246, 0.2); }
        .frame-isdb { border: 4px solid #fbbf24 !important; background: linear-gradient(145deg, #064e3b, #022c22) !important; box-shadow: 0 0 25px #fbbf24 !important; }
        .status-joining { background: var(--isd-yellow) !important; color: #000 !important; }
        .status-paid { background: #22c55e !important; color: #fff !important; }
        .stat-card { background: #111; border: 1px solid #222; border-radius: 16px; padding: 1rem; }
        .island-btn { width: 70px; height: 70px; background: var(--isd-yellow); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; cursor: pointer; border: 3px solid #fff; transition: 0.3s; position: relative; }
        .bday-glow { border-color: #f472b6 !important; animation: pulse-bday 2s infinite; }
        @keyframes pulse-bday { 0%, 100% { box-shadow: 0 0 0px #f472b6; } 50% { box-shadow: 0 0 20px #f472b6; } }
    </style>
</head>
<body class="p-4 lg:p-8">

    <div class="max-w-[1600px] mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-6">
            <div>
                <h1 class="text-4xl lg:text-6xl font-black text-yellow-500 italic uppercase leading-none tracking-tighter">ISD TABLE TENNIS TERM TRACKER</h1>
                <p class="text-[10px] font-bold text-gray-500 mt-2 tracking-[0.3em] uppercase">created by Leo for ISD Racket Sports</p>
            </div>
            <div class="flex items-center gap-4">
                <button onclick="showWeeklyReport()" class="bg-white text-black font-black px-6 py-3 rounded-xl uppercase text-[10px]">Manager's Report</button>
                <div onclick="openReg()" class="island-btn">🏓<span class="text-lg absolute bottom-0 right-0 bg-black text-white rounded-full w-6 h-6 flex items-center justify-center">+</span></div>
            </div>
        </header>

        <div id="stats" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 xl:grid-cols-11 gap-2 mb-8"></div>

        <div class="flex flex-col lg:flex-row gap-4 mb-6">
            <input type="text" id="search" onkeyup="render()" placeholder="Search 53 students..." class="flex-1 bg-neutral-900 p-4 rounded-xl border border-neutral-800 outline-none text-white">
            <div class="flex gap-2">
                <button onclick="currentTab='active'; render()" class="px-8 py-4 bg-yellow-500 text-black font-black rounded-xl text-[10px] uppercase">Active Roster</button>
                <button onclick="currentTab='vault'; render()" class="px-8 py-4 bg-neutral-900 text-gray-500 font-black rounded-xl text-[10px] uppercase border border-neutral-800">Not Joining</button>
                <button onclick="downloadCSV()" class="px-4 py-4 bg-blue-600/20 text-blue-400 border border-blue-600/30 rounded-xl"><i class="fas fa-download"></i></button>
            </div>
        </div>

        <div id="mainGrid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6"></div>
    </div>

    <div id="regModal" class="fixed inset-0 bg-black/95 backdrop-blur-md hidden z-50 flex items-center justify-center p-4">
        <div id="modalFrame" class="bg-neutral-900 p-8 rounded-[40px] w-full max-w-2xl border-4 transition-all">
            <h2 class="text-3xl font-black text-yellow-500 mb-6 uppercase italic">New Student Form</h2>
            <form onsubmit="saveNewKid(event)" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input type="text" id="nkName" placeholder="Kid's Full Name" required class="p-4 rounded-xl bg-black border border-neutral-800 text-white outline-none">
                <input type="date" id="nkDob" onchange="updateModalFrame()" class="p-4 rounded-xl bg-white text-black font-bold outline-none">
                <input type="text" id="npName" placeholder="Parents Full Name" required class="p-4 rounded-xl bg-black border border-neutral-800 text-white">
                <input type="email" id="npEmail" placeholder="Email Address" required class="p-4 rounded-xl bg-black border border-neutral-800 text-white">
                <input type="tel" id="npPhone" placeholder="Contact (971...)" required class="p-4 rounded-xl bg-black border border-neutral-800 text-white">
                <div class="col-span-full bg-black p-4 rounded-2xl border border-neutral-800">
                    <p class="text-[10px] font-bold text-gray-500 uppercase mb-3">Schedule</p>
                    <input type="text" id="nkSchedule" placeholder="e.g. Mon 4pm, Wed 5pm" class="w-full bg-neutral-900 p-3 rounded-lg text-white border border-neutral-700 outline-none">
                </div>
                <button type="submit" class="col-span-full bg-yellow-500 text-black font-black py-5 rounded-2xl uppercase text-lg">Register Now</button>
                <button type="button" onclick="closeReg()" class="col-span-full text-gray-600 text-[10px] uppercase font-bold mt-2 text-center">Cancel</button>
            </form>
        </div>
    </div>

    <div id="reportModal" class="fixed inset-0 bg-black/98 hidden z-50 flex items-center justify-center p-4">
        <div class="bg-neutral-900 p-10 rounded-[40px] w-full max-w-3xl border border-white/5 max-h-[90vh] overflow-y-auto">

            <button onclick="document.getElementById('reportModal').classList.add('hidden')" class="mt-8 w-full bg-white text-black font-black py-4 rounded-2xl uppercase">Close</button>

        const RATES = { 'U8': [0, 1390, 2645, 3962, 5200], 'U12': [0, 1695, 3220, 4830, 6000], 'U16': [0, 1695, 3220, 4830, 6000] };
        let students = JSON.parse(localStorage.getItem('isd_final_v6_registry')) || INITIAL_KIDS.map((k, i) => ({
            ...k, id: Date.now() + i, status: 'pending', vault: false, isdb: false,
            fee: calculateFee(k.dob, k.schedule)
        }));
        let currentTab = 'active';

        function calculateAgeGrp(dob) {
            const age = new Date().getFullYear() - new Date(dob).getFullYear();
            return age < 8 ? 'U8' : (age < 12 ? 'U12' : 'U16');
        }

        function calculateFee(dob, schedule) {
            const grp = calculateAgeGrp(dob);
            const count = (schedule.match(/&/g) || schedule.match(/,/g) || []).length + 1;
            return RATES[grp][count] || RATES[grp][1];
        }

        function save() { localStorage.setItem('isd_final_v6_registry', JSON.stringify(students)); render(); }
        function setStatus(id, st) { const s = students.find(x => x.id == id); s.status = st; if(st==='joining') sendWhatsApp(id,'confirm'); save(); }
        function resetStatus(id) { const s = students.find(x => x.id == id); s.status = 'pending'; s.isdb = false; save(); }
        function toggleISDB(id) { const s = students.find(x => x.id == id); s.isdb = !s.isdb; if(s.isdb) s.status = 'paid'; save(); }
        function toggleVault(id) { const s = students.find(x => x.id == id); s.vault = !s.vault; save(); }

        function render() {
            const grid = document.getElementById('mainGrid');
            const search = document.getElementById('search').value.toLowerCase();
            grid.innerHTML = '';
            const list = students.filter(s => s.name.toLowerCase().includes(search) && (currentTab==='active' ? !s.vault : s.vault));

            list.forEach(s => {
                const grp = calculateAgeGrp(s.dob);
                const isBday = new Date(s.dob).getDate() === new Date().getDate() && new Date(s.dob).getMonth() === new Date().getMonth();
                grid.innerHTML += `
                    <div class="stat-card frame-${grp.toLowerCase()} ${s.isdb?'frame-isdb':''} ${isBday?'bday-glow':''} relative">
                        ${isBday ? '<div class="absolute -top-3 left-1/2 -translate-x-1/2 bg-pink-500 text-[8px] font-black px-4 py-1 rounded-full uppercase">🎂 ISD B-DAY WISHES!</div>' : ''}
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <h3 class="text-xl font-black italic uppercase">${s.name}</h3>
                                <p class="text-[9px] font-bold text-gray-500 uppercase mt-1">${s.pName} • ${grp}</p>
                            </div>
                            <div class="text-right"><p class="text-xl font-black text-yellow-500">${s.fee} AED</p></div>
                        </div>
                        <div class="bg-black/50 p-3 rounded-xl mb-4 text-[10px] border border-white/5">
                            <p class="text-white font-black"><i class="fas fa-calendar-day mr-2 text-yellow-500"></i>${s.schedule}</p>
                            <p class="text-gray-500 mt-1 uppercase">${s.phone} | ${s.email || 'No Email'}</p>
                        </div>
                        <div class="grid grid-cols-3 gap-1">
                            <button ondblclick="resetStatus(${s.id})" onclick="sendWhatsApp(${s.id}, 'invite')" class="bg-green-600/20 text-green-400 border border-green-600/30 p-2 rounded-lg text-[8px] font-black uppercase">
                                <i class="fab fa-whatsapp text-lg mr-1"></i> ${s.status === 'invited' ? 'SENT' : 'INVITE'}
                            </button>
                            <button ondblclick="resetStatus(${s.id})" onclick="setStatus(${s.id}, 'joining')" class="p-2 rounded-lg text-[8px] font-black uppercase ${s.status==='joining'?'status-joining':'bg-neutral-800 text-gray-500'}">Joining</button>
                            <button ondblclick="resetStatus(${s.id})" onclick="setStatus(${s.id}, 'paid')" class="p-2 rounded-lg text-[8px] font-black uppercase ${s.status==='paid'?'status-paid':'bg-neutral-800 text-gray-500'}">Paid</button>
                            <button ondblclick="resetStatus(${s.id})" onclick="toggleISDB(${s.id})" class="col-span-full p-2 rounded-lg text-[8px] font-black uppercase bg-blue-900 mt-1 ${s.isdb?'bg-yellow-600 text-black':''}">ISDB DONE</button>
                        </div>
                        <button onclick="toggleVault(${s.id})" class="w-full mt-3 text-[8px] font-bold text-gray-700 uppercase">${s.vault ? 'Restore' : 'Not Joining'}</button>
                    </div>
                `;
            });
            updateStats();
        }

        function updateStats() {
            const stats = { rev:0, reg:0, isdb:0, vault:0, paid:0, u8:0, u12:0, u16:0 };
            students.forEach(s => {
                if(s.vault) { stats.vault++; return; }
                const g = calculateAgeGrp(s.dob).toLowerCase(); stats[g]++;
                if(s.status==='paid' || s.isdb) { stats.rev += s.fee; stats.paid++; }
                if(s.status==='joining' || s.status==='paid') stats.reg++;
                if(s.isdb) stats.isdb++;
            });
            const bar = document.getElementById('stats'); bar.innerHTML = '';
            const data = [["Revenue", stats.rev.toLocaleString(), "text-green-500"], ["Registered", stats.reg, "text-yellow-500"], ["ISDB", stats.isdb, "text-blue-400"], ["Paid", stats.paid, "text-green-400"]];
            data.forEach(d => { bar.innerHTML += `<div class="stat-card"><p class="text-[8px] font-black text-gray-500 uppercase">${d[0]}</p><h3 class="text-xl font-black ${d[2]}">${d[1]}</h3></div>`; });
        }

        function sendWhatsApp(id, type) {
            const s = students.find(x => x.id == id);
            let msg = "";
            if(type === 'invite') msg = `🏓 ISD Invitation\n\nDear ${s.pName},\nWe invite ${s.name} for Term 3.\nSchedule: ${s.schedule}.\nConfirm to reserve.`;
            if(type === 'confirm') msg = `🏓 ISD Confirmation\n\nDear ${s.pName},\nConfirmed ${s.name} for Term 3!`;
            window.open(`https://wa.me/${s.phone}?text=${encodeURIComponent(msg)}`);
            if(type === 'invite') { s.status = 'invited'; save(); }
        }

        function showWeeklyReport() {
            const stats = { rev:0, reg:0, isdb:0, vault:0, u8:0, u12:0, u16:0 };
            students.forEach(s => { if(s.vault) stats.vault++; else { stats[calculateAgeGrp(s.dob).toLowerCase()]++; if(s.isdb||s.status==='paid') stats.rev+=s.fee; if(s.status==='joining'||s.status==='paid') stats.reg++; if(s.isdb) stats.isdb++; }});
            document.getElementById('reportContent').innerHTML = `<h2 class="text-3xl font-black text-yellow-500 mb-6 italic uppercase">Manager Report</h2><div class="grid grid-cols-2 gap-4 mb-6"><div class="bg-black p-4 rounded-2xl"><p class="text-[10px] text-gray-500 font-bold uppercase">Revenue</p><p class="text-2xl font-black text-green-500">${stats.rev.toLocaleString()} AED</p></div><div class="bg-black p-4 rounded-2xl"><p class="text-[10px] text-gray-500 font-bold uppercase">Registered</p><p class="text-2xl font-black text-yellow-500">${stats.reg}</p></div></div><div class="space-y-2 text-[12px] font-bold uppercase"><div class="flex justify-between border-b border-white/5 pb-2"><span>U8:</span><span class="text-pink-500">${stats.u8}</span></div><div class="flex justify-between border-b border-white/5 pb-2"><span>U12:</span><span class="text-yellow-500">${stats.u12}</span></div><div class="flex justify-between border-b border-white/5 pb-2"><span>U16:</span><span class="text-blue-500">${stats.u16}</span></div></div>`;
            document.getElementById('reportModal').classList.remove('hidden');
        }

        function openReg() { document.getElementById('regModal').classList.remove('hidden'); }
        function closeReg() { document.getElementById('regModal').classList.add('hidden'); }
        function saveNewKid(e) { e.preventDefault(); const dob = document.getElementById('nkDob').value; const sched = document.getElementById('nkSchedule').value; students.push({ id: Date.now(), name: document.getElementById('nkName').value, dob, pName: document.getElementById('npName').value, email: document.getElementById('npEmail').value, phone: document.getElementById('npPhone').value, schedule: sched, fee: calculateFee(dob, sched), status: 'pending', vault: false, isdb: false }); save(); closeReg(); alert("Welcome to ISD Family!"); }
        function downloadCSV() { let csv = "Name,Age,Parent,Phone,Schedule,Fee,Status\n"; students.forEach(s => csv += `"${s.name}","${calculateAgeGrp(s.dob)}","${s.pName}","${s.phone}","${s.schedule}","${s.fee}","${s.status}"\n`); window.open('data:text/csv;charset=utf-8,' + encodeURI(csv)); }

        render();
    </script>
</body>
</html>
